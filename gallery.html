<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HRDexDB Objects</title>
  <link rel="preconnect" href="https://huggingface.co" crossorigin>
  <link rel="preconnect" href="https://cdn-lfs.huggingface.co" crossorigin>
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="dns-prefetch" href="//huggingface.co">
  <link rel="dns-prefetch" href="//cdn-lfs.huggingface.co">
  <link rel="dns-prefetch" href="//unpkg.com">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-2: #1c222b;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --green: #3fb950;
      --red: #f85149;
      --radius: 8px;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }
    button, input, select { font: inherit; }
    button { cursor: pointer; }

    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 24px;
      min-height: 53px;
      padding: 12px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      color: var(--text);
      font-size: 1.2em;
      font-weight: 700;
      white-space: nowrap;
    }

    .nav-link {
      padding: 0;
      border: 0;
      background: none;
      color: var(--text-muted);
      font-size: 0.95em;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--text);
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    .view { display: none; }
    .view.active { display: block; }

    .search-bar,
    .obj-select {
      width: 100%;
      min-height: 42px;
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      background: var(--surface);
      color: var(--text);
      font-size: 1em;
    }

    .search-bar { margin-bottom: 16px; }
    .search-bar:focus,
    .obj-select:focus { border-color: var(--accent); }
    .search-bar::placeholder { color: var(--text-muted); }

    .stats-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 16px;
      color: var(--text-muted);
      font-size: 0.9em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 16px;
    }

    .grid-item,
    .episode-card,
    .viewer-panel {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .grid-item,
    .episode-card {
      width: 100%;
      color: var(--text);
      text-align: left;
      transition: border-color 0.2s, transform 0.15s;
    }

    .grid-item:hover,
    .episode-card:hover,
    .episode-card.active {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .thumb-slot,
    .episode-thumb {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
      background:
        linear-gradient(135deg, rgba(88, 166, 255, 0.16), rgba(63, 185, 80, 0.08)),
        radial-gradient(circle at 30% 20%, rgba(121, 192, 255, 0.18), transparent 34%),
        var(--surface-2);
    }

    .thumb-slot {
      aspect-ratio: 1;
    }

    .episode-thumb {
      aspect-ratio: 16 / 9;
    }

    .episode-thumb img {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: var(--surface-2);
    }

    .thumb-slot::after,
    .episode-thumb::after {
      position: absolute;
      inset: 0;
      content: "";
      opacity: 0.55;
      background-image:
        linear-gradient(135deg, rgba(230, 237, 243, 0.05) 25%, transparent 25%, transparent 50%, rgba(230, 237, 243, 0.05) 50%, rgba(230, 237, 243, 0.05) 75%, transparent 75%, transparent);
      background-size: 18px 18px;
    }

    .thumb-slot img {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: var(--surface-2);
    }

    .thumb-slot.thumb-missing img {
      display: none;
    }

    .episode-num {
      position: relative;
      z-index: 1;
      color: rgba(230, 237, 243, 0.88);
      font-weight: 800;
      letter-spacing: 0;
    }

    .episode-num { font-size: 1.35rem; }

    .episode-thumb img + .episode-num {
      display: none;
    }

    .episode-thumb.thumb-missing .episode-num {
      display: block;
    }

    .grid-item .label {
      padding: 8px 10px 0;
      overflow: hidden;
      font-size: 0.9em;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .hands-info {
      padding: 0 10px 8px;
      overflow: hidden;
      color: var(--text-muted);
      font-size: 0.75em;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .object-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .object-header h1 {
      font-size: 1.8em;
      line-height: 1.2;
    }

    .object-subtitle {
      margin-top: 4px;
      color: var(--text-muted);
      font-size: 0.9em;
    }

    .back-link {
      flex: 0 0 auto;
      padding: 4px 0;
      border: 0;
      background: none;
      color: var(--text-muted);
      font-size: 0.9em;
    }

    .back-link:hover { color: var(--accent-hover); }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      overflow-x: auto;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 0 0 auto;
      padding: 10px 18px;
      border: 0;
      border-bottom: 2px solid transparent;
      background: none;
      color: var(--text-muted);
      font-size: 0.95em;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab:hover { color: var(--text); }
    .tab.active {
      border-bottom-color: var(--accent);
      color: var(--text);
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 360px) minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .episode-count {
      color: var(--text-muted);
      font-size: 0.9em;
      text-align: right;
    }

    .detail-layout {
      display: grid;
      grid-template-columns: minmax(270px, 0.9fr) minmax(420px, 1.35fr);
      align-items: start;
      gap: 16px;
    }

    .episode-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }

    .episode-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
    }

    .badge {
      display: inline-flex;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75em;
      font-weight: 700;
      line-height: 1;
    }

    .badge-rank {
      background: var(--accent);
      color: var(--bg);
    }

    .badge-result {
      color: var(--bg);
      text-transform: lowercase;
    }

    .badge-success {
      background: var(--green);
    }

    .badge-fail {
      background: var(--red);
    }

    .viewer-panel {
      position: sticky;
      top: 73px;
      min-height: 520px;
    }

    .viewer-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 46px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    .viewer-title {
      min-width: 0;
      overflow: hidden;
      font-size: 0.92em;
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewer-status {
      overflow: hidden;
      color: var(--text-muted);
      font-size: 0.78em;
      text-align: right;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewer-actions {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .load-glb-button {
      flex: 0 0 auto;
      min-height: 30px;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface-2);
      color: var(--text);
      font-size: 0.78em;
      font-weight: 700;
    }

    .load-glb-button:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent-hover);
    }

    .load-glb-button:disabled {
      cursor: default;
      opacity: 0.62;
    }

    #viewer {
      position: relative;
      height: min(68vh, 720px);
      min-height: 474px;
      background: #0f141b;
    }

    #viewer canvas {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
      cursor: grab;
      touch-action: none;
    }

    .viewer-preview {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: none;
      align-items: center;
      justify-content: center;
      background: #0f141b;
    }

    .viewer-preview.active {
      display: flex;
    }

    .viewer-preview > img,
    .viewer-video-shell {
      width: 100%;
      height: 100%;
    }

    .viewer-preview > img,
    .viewer-video-shell video {
      object-fit: contain;
      background: #0f141b;
    }

    .viewer-video-shell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .viewer-video-shell video {
      width: 100%;
      height: 100%;
    }

    .viewer-camera-bar {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid rgba(230, 237, 243, 0.16);
      border-radius: var(--radius);
      background: rgba(13, 17, 23, 0.84);
      color: var(--text-muted);
      font-size: 0.78em;
      backdrop-filter: blur(10px);
    }

    .camera-select {
      min-width: 112px;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--text);
      font-size: 1em;
    }

    .loading,
    .empty-state {
      padding: 48px 24px;
      color: var(--text-muted);
      text-align: center;
    }

    @media (max-width: 900px) {
      .controls,
      .detail-layout {
        grid-template-columns: 1fr;
      }

      .episode-count { text-align: left; }
      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .viewer-panel { position: static; }
    }

    @media (max-width: 640px) {
      .nav {
        gap: 16px;
        padding: 12px 16px;
      }

      .container { padding: 18px 14px; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .object-header { display: block; }
      .back-link { margin-top: 8px; }
      #viewer {
        height: 62vh;
        min-height: 360px;
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav-logo" href="gallery-index.html">HRDexDB</a>
    <button class="nav-link active" id="gallery-nav" type="button">Objects</button>
  </nav>

  <main class="container">
    <section class="view active" id="gallery-view">
      <input type="search" class="search-bar" id="search" placeholder="Search objects" autocomplete="off">
      <div class="stats-bar" id="stats">Loading catalog...</div>
      <div class="grid" id="grid"></div>
    </section>

    <section class="view" id="detail-view">
      <div class="object-header">
        <div>
          <h1 id="object-title"></h1>
          <p class="object-subtitle" id="object-subtitle"></p>
        </div>
        <button class="back-link" id="back-button" type="button">Back to objects</button>
      </div>

      <div class="tabs" id="embodiment-tabs"></div>

      <div class="controls">
        <select class="obj-select" id="object-select"></select>
        <div class="episode-count" id="episode-count"></div>
      </div>

      <div class="detail-layout">
        <div class="episode-grid" id="episode-grid"></div>
        <aside class="viewer-panel">
          <div class="viewer-meta">
            <div class="viewer-title" id="viewer-title">Select a sequence</div>
            <div class="viewer-actions">
              <div class="viewer-status" id="viewer-status">Idle</div>
              <button class="load-glb-button" id="load-glb-button" type="button" disabled>Open interactive 3D</button>
            </div>
          </div>
          <div id="viewer"></div>
        </aside>
      </div>
    </section>
  </main>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script>
    const CATALOG_URL = "https://huggingface.co/spaces/HRDexDB/HRDexDB-Visualizer/raw/main/assets/glb_catalog.json";
    const GLB_BASE = "https://huggingface.co/datasets/HRDexDB/HRDexDB-glb/resolve/main";
    const THUMB_BASE = "https://willi19.github.io/autodex-gallery/objects";
    const GLB_CACHE_NAME = "hrdexdb-original-glb-v1";
    const PREVIEW_MANIFEST_URL = "static/gallery-previews/manifest.json";
    const CAMERA_VIDEO_MANIFEST_URL = "static/gallery-camera-videos/manifest.json";
    const GRASP_RESULT_MANIFEST_URL = "static/gallery-grasp-results/manifest.json";
    const PREVIEW_ASSETS = {};
    const CAMERA_VIDEO_ASSETS = {};
    const ANIMATION_TRIMS = {};
    const GRASP_RESULTS = {};
    const CAMERA_PRESETS = {
      default: {
        focus: [0.07, -0.10, 0.02],
        distanceScale: 0.48
      },
      human: {
        focus: [0.10, 0.08, 0.10],
        distanceScale: 0.48
      }
    };
    const CAMERA_VIEW_DIRECTION = [0.95, 0.36, 1.04];

    let catalog = {};
    let objects = [];
    let filteredObjects = [];
    let previewAssets = PREVIEW_ASSETS;
    let cameraVideoAssets = CAMERA_VIDEO_ASSETS;
    let animationTrims = ANIMATION_TRIMS;
    let graspResults = GRASP_RESULTS;
    let currentObject = null;
    let currentEmbodiment = null;
    let currentEpisode = null;
    const selectedCameras = {};

    let THREE;
    let OrbitControls;
    let GLTFLoader;
    let MeshoptDecoder;
    let threeRuntimePromise;
    let scene;
    let camera;
    let renderer;
    let controls;
    let clock;
    let mixer = null;
    let model = null;
    let previewLayer = null;
    let animationDuration = 0;
    let animationClipDuration = 0;
    let animationTrim = null;
    let animationTrackData = [];
    let viewerReady = false;
    let loadToken = 0;
    const inflightGlbBlobs = new Map();

    const labels = {
      allegro_v5: "Allegro V5",
      human: "Human",
      inspire_f1: "Inspire F1"
    };
    const cardLabels = {
      allegro_v5: "allegro",
      human: "human",
      inspire_f1: "inspire"
    };
    const robotEmbodiments = new Set(["allegro_v5", "inspire_f1"]);

    const el = {
      galleryView: document.getElementById("gallery-view"),
      detailView: document.getElementById("detail-view"),
      galleryNav: document.getElementById("gallery-nav"),
      search: document.getElementById("search"),
      stats: document.getElementById("stats"),
      grid: document.getElementById("grid"),
      objectTitle: document.getElementById("object-title"),
      objectSubtitle: document.getElementById("object-subtitle"),
      backButton: document.getElementById("back-button"),
      embodimentTabs: document.getElementById("embodiment-tabs"),
      objectSelect: document.getElementById("object-select"),
      episodeCount: document.getElementById("episode-count"),
      episodeGrid: document.getElementById("episode-grid"),
      viewer: document.getElementById("viewer"),
      viewerTitle: document.getElementById("viewer-title"),
      viewerStatus: document.getElementById("viewer-status"),
      loadGlbButton: document.getElementById("load-glb-button")
    };

    init();

    async function init() {
      try {
        const [response, previewManifest, cameraVideoManifest, graspResultManifest] = await Promise.all([
          fetch(CATALOG_URL),
          loadPreviewManifest(),
          loadCameraVideoManifest(),
          loadGraspResultManifest()
        ]);
        if (!response.ok) throw new Error(`Catalog request failed: ${response.status}`);
        catalog = await response.json();
        applyPreviewManifest(previewManifest);
        applyCameraVideoManifest(cameraVideoManifest);
        applyGraspResultManifest(graspResultManifest);
        objects = buildObjects(catalog);
        filteredObjects = objects;
        currentObject = objects[0]?.id || null;
        renderGallery();
        loadHashState();
      } catch (error) {
        el.stats.textContent = "Could not load the catalog.";
        el.grid.innerHTML = `
          <div class="empty-state">
            Could not load the HRDexDB GLB catalog.<br>
            <a href="${CATALOG_URL}" target="_blank" rel="noreferrer">Open catalog source</a>
          </div>`;
        console.error(error);
      }
    }

    async function loadPreviewManifest() {
      try {
        const response = await fetch(PREVIEW_MANIFEST_URL, { cache: "no-cache" });
        if (!response.ok) return null;
        return response.json();
      } catch (error) {
        console.warn(error);
        return null;
      }
    }

    async function loadCameraVideoManifest() {
      try {
        const response = await fetch(CAMERA_VIDEO_MANIFEST_URL, { cache: "no-cache" });
        if (!response.ok) return null;
        return response.json();
      } catch (error) {
        console.warn(error);
        return null;
      }
    }

    async function loadGraspResultManifest() {
      try {
        const response = await fetch(GRASP_RESULT_MANIFEST_URL, { cache: "no-cache" });
        if (!response.ok) return null;
        return response.json();
      } catch (error) {
        console.warn(error);
        return null;
      }
    }

    function applyPreviewManifest(manifest) {
      const assets = manifest?.assets || {};
      previewAssets = { ...PREVIEW_ASSETS, ...assets };
      animationTrims = { ...ANIMATION_TRIMS };
      for (const [key, asset] of Object.entries(assets)) {
        if (asset?.trim) animationTrims[key] = asset.trim;
      }
    }

    function applyCameraVideoManifest(manifest) {
      cameraVideoAssets = { ...CAMERA_VIDEO_ASSETS, ...(manifest?.assets || {}) };
    }

    function applyGraspResultManifest(manifest) {
      graspResults = { ...GRASP_RESULTS, ...(manifest?.results || {}) };
    }

    function buildObjects(source) {
      const objectIds = Array.from(
        new Set(Object.values(source).flatMap(objectsByEmbodiment => Object.keys(objectsByEmbodiment)))
      ).sort();

      return objectIds.map(id => {
        const embodiments = {};
        let totalEpisodes = 0;
        for (const [embodiment, objectsByEmbodiment] of Object.entries(source)) {
          const episodes = objectsByEmbodiment[id] || [];
          if (episodes.length) {
            embodiments[embodiment] = episodes.length;
            totalEpisodes += episodes.length;
          }
        }
        return {
          id,
          name: titleize(id),
          embodiments,
          totalEpisodes
        };
      });
    }

    function titleize(value) {
      return value
        .replace(/_/g, " ")
        .replace(/\b\w/g, letter => letter.toUpperCase());
    }

    function objectData(objectId) {
      return objects.find(object => object.id === objectId) || null;
    }

    function embodimentKeys(objectId) {
      const object = objectData(objectId);
      if (!object) return [];
      return Object.keys(object.embodiments).filter(embodiment => catalog[embodiment]?.[objectId]?.length);
    }

    function episodesFor(objectId, embodiment) {
      return catalog[embodiment]?.[objectId] || [];
    }

    function updateStats(items) {
      const parts = [`${items.length} objects`];
      for (const embodiment of Object.keys(catalog)) {
        const count = items.filter(object => object.embodiments[embodiment]).length;
        parts.push(`${count} with ${labels[embodiment] || titleize(embodiment)}`);
      }
      el.stats.textContent = parts.join(" | ");
    }

    function renderGallery() {
      updateStats(filteredObjects);

      if (!filteredObjects.length) {
        el.grid.innerHTML = '<div class="empty-state">No objects found.</div>';
        return;
      }

      el.grid.innerHTML = filteredObjects.map(object => {
        const hands = Object.entries(object.embodiments)
          .map(([embodiment]) => cardLabels[embodiment] || titleize(embodiment).toLowerCase())
          .join(", ");

        return `
          <button class="grid-item" type="button" data-object="${object.id}">
            <div class="thumb-slot">
              <img src="${THUMB_BASE}/${encodeURIComponent(object.id)}/thumb.png" alt="${object.name}" loading="lazy" onerror="this.parentElement.classList.add('thumb-missing')">
            </div>
            <div class="label">${object.name}</div>
            <div class="hands-info">${hands}</div>
          </button>`;
      }).join("");

      el.grid.querySelectorAll(".grid-item").forEach(card => {
        card.addEventListener("click", () => openDetail(card.dataset.object));
      });
    }

    function setActiveView(view) {
      const isDetail = view === "detail";
      el.galleryView.classList.toggle("active", !isDetail);
      el.detailView.classList.toggle("active", isDetail);
      el.galleryNav.classList.toggle("active", !isDetail);
    }

    function openGallery() {
      setActiveView("gallery");
      history.replaceState(null, "", "#gallery");
    }

    function openDetail(objectId, embodiment = null, episode = null) {
      const object = objectData(objectId);
      if (!object) return;

      currentObject = objectId;
      const keys = embodimentKeys(objectId);
      currentEmbodiment = keys.includes(embodiment) ? embodiment : keys[0] || null;

      const episodes = episodesFor(currentObject, currentEmbodiment);
      currentEpisode = episodes.includes(episode) ? episode : episodes[0] || null;

      setActiveView("detail");
      renderDetail();
      writeHash();
      loadCurrentEpisode();
    }

    function renderDetail() {
      const object = objectData(currentObject);
      if (!object) return;

      const keys = embodimentKeys(object.id);
      const episodes = episodesFor(object.id, currentEmbodiment);

      el.objectTitle.textContent = object.name;
      el.objectSubtitle.textContent = `${keys.length} embodiments, ${object.totalEpisodes} sequences`;

      el.objectSelect.innerHTML = objects.map(item => `
        <option value="${item.id}" ${item.id === object.id ? "selected" : ""}>${item.name}</option>
      `).join("");

      el.embodimentTabs.innerHTML = keys.map(embodiment => `
        <button class="tab ${embodiment === currentEmbodiment ? "active" : ""}" type="button" data-embodiment="${embodiment}">
          ${labels[embodiment] || titleize(embodiment)} (${object.embodiments[embodiment]})
        </button>
      `).join("");

      el.embodimentTabs.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", () => openDetail(object.id, tab.dataset.embodiment));
      });

      el.episodeCount.textContent = `${episodes.length} sequences`;
      el.episodeGrid.innerHTML = episodes.map((episode, index) => `
        <button class="episode-card ${episode === currentEpisode ? "active" : ""}" type="button" data-episode="${episode}">
          <div class="episode-thumb">${episodePreviewHtml(currentEmbodiment, object.id, episode)}</div>
          <div class="episode-footer">
            <span class="badge badge-rank">${episodeDisplayLabel(currentEmbodiment, object.id, episode, index)}</span>
            ${episodeResultBadgeHtml(currentEmbodiment, object.id, episode)}
          </div>
        </button>
      `).join("");

      el.episodeGrid.querySelectorAll(".episode-card").forEach(card => {
        card.addEventListener("click", () => {
          currentEpisode = card.dataset.episode;
          renderDetail();
          writeHash();
          loadCurrentEpisode();
        });
      });
    }

    function loadCurrentEpisode() {
      if (!currentEpisode) return;
      showPreviewOnly(currentEmbodiment, currentObject, currentEpisode);
    }

    function writeHash() {
      history.replaceState(
        null,
        "",
        `#object=${encodeURIComponent(currentObject || "")}&embodiment=${encodeURIComponent(currentEmbodiment || "")}&episode=${encodeURIComponent(currentEpisode || "")}`
      );
    }

    function loadHashState() {
      const state = hashEpisodeState();
      if (state?.objectId && objectData(state.objectId)) {
        openDetail(state.objectId, state.embodiment, state.episode);
      }
    }

    function hashEpisodeState() {
      const params = new URLSearchParams(location.hash.replace(/^#/, ""));
      const objectId = params.get("object");
      const embodiment = params.get("embodiment");
      const episode = params.get("episode");
      if (!objectId || !embodiment || !episode) return null;
      return { objectId, embodiment, episode };
    }

    function glbUrl(embodiment, objectId, episode) {
      const path = [embodiment, objectId, `${episode}.glb`]
        .map(part => encodeURIComponent(part))
        .join("/");
      return `${GLB_BASE}/${path}`;
    }

    function glbAssetFor(embodiment, objectId, episode) {
      return {
        url: glbUrl(embodiment, objectId, episode),
        originalUrl: glbUrl(embodiment, objectId, episode)
      };
    }

    function previewFor(embodiment, objectId, episode) {
      return previewAssets[`${embodiment}/${objectId}/${episode}`] || null;
    }

    function cameraVideosFor(embodiment, objectId, episode) {
      return cameraVideoAssets[`${embodiment}/${objectId}/${episode}`] || null;
    }

    function cameraAssetKey(embodiment, objectId, episode) {
      return `${embodiment}/${objectId}/${episode}`;
    }

    function selectedCameraFor(embodiment, objectId, episode, asset = null) {
      const key = cameraAssetKey(embodiment, objectId, episode);
      const cameraAsset = asset || cameraVideosFor(embodiment, objectId, episode);
      const cameras = cameraAsset?.cameras || [];
      if (!cameras.length) return null;
      const stored = selectedCameras[key];
      return cameras.find(camera => camera.id === stored)
        || cameras.find(camera => camera.id === cameraAsset.defaultCamera)
        || cameras[0];
    }

    function animationTrimFor(embodiment, objectId, episode) {
      return animationTrims[`${embodiment}/${objectId}/${episode}`] || null;
    }

    function graspResultFor(embodiment, objectId, episode) {
      return graspResults[`${embodiment}/${objectId}/${episode}`] || null;
    }

    function episodeDisplayLabel(embodiment, objectId, episode, index = 0) {
      const result = graspResultFor(embodiment, objectId, episode);
      const displayEpisode = robotEmbodiments.has(embodiment) && result?.humanPairedEpisode != null
        ? result.humanPairedEpisode
        : episode;
      return `#${String(displayEpisode).padStart(2, "0")}`;
    }

    function episodeTitleLabel(embodiment, objectId, episode) {
      const result = graspResultFor(embodiment, objectId, episode);
      return robotEmbodiments.has(embodiment) && result?.humanPairedEpisode != null
        ? result.humanPairedEpisode
        : episode;
    }

    function episodeResultBadgeHtml(embodiment, objectId, episode) {
      if (!robotEmbodiments.has(embodiment)) return "";
      const result = graspResultFor(embodiment, objectId, episode);
      if (!result || typeof result.graspSuccess !== "boolean") return "";
      const state = result.graspSuccess ? "success" : "fail";
      return `<span class="badge badge-result badge-${state}">${state}</span>`;
    }

    function episodePreviewHtml(embodiment, objectId, episode) {
      const cameraAsset = cameraVideosFor(embodiment, objectId, episode);
      if (!cameraAsset?.poster) return `<span class="episode-num">#${episode}</span>`;
      return `
        <img src="${cameraAsset.poster}" alt="" loading="lazy" onerror="this.parentElement.classList.add('thumb-missing'); this.remove()">
        <span class="episode-num">#${episode}</span>
      `;
    }

    function objectThumbUrl(objectId) {
      return `${THUMB_BASE}/${encodeURIComponent(objectId)}/thumb.png`;
    }

    function ensurePreviewLayer() {
      if (!previewLayer) {
        previewLayer = document.createElement("div");
        previewLayer.className = "viewer-preview";
        el.viewer.appendChild(previewLayer);
      }
      return previewLayer;
    }

    function showInstantPreview(embodiment, objectId, episode) {
      const layer = ensurePreviewLayer();
      const cameraAsset = cameraVideosFor(embodiment, objectId, episode);
      const cameras = cameraAsset?.cameras || [];
      pausePreviewVideo();

      if (cameras.length) {
        const selectedCamera = selectedCameraFor(embodiment, objectId, episode, cameraAsset);
        layer.innerHTML = `
          <div class="viewer-video-shell">
            <div class="viewer-camera-bar">
              <span>Camera</span>
              <select class="camera-select" aria-label="Camera view">
                ${cameras.map(camera => `
                  <option value="${camera.id}" ${camera.id === selectedCamera.id ? "selected" : ""}>${camera.label || camera.id}</option>
                `).join("")}
              </select>
            </div>
            <video src="${selectedCamera.url}" poster="${cameraAsset.poster || ""}" controls preload="metadata" loop muted playsinline autoplay></video>
          </div>
        `;
        const select = layer.querySelector(".camera-select");
        select?.addEventListener("change", event => {
          selectedCameras[cameraAssetKey(embodiment, objectId, episode)] = event.target.value;
          showInstantPreview(embodiment, objectId, episode);
        });
        const playPromise = layer.querySelector("video")?.play?.();
        if (playPromise) playPromise.catch(() => {});
        el.viewerStatus.textContent = `Camera ${selectedCamera.label || selectedCamera.id}`;
      } else {
        layer.innerHTML = `<div class="empty-state">No camera video found.</div>`;
        el.viewerStatus.textContent = "No camera video";
      }

      layer.classList.add("active");
    }

    function pausePreviewVideo() {
      previewLayer?.querySelector("video")?.pause();
    }

    function hideInstantPreview() {
      if (!previewLayer) return;
      pausePreviewVideo();
      previewLayer.classList.remove("active");
    }

    function currentPreviewTime() {
      const video = previewLayer?.querySelector("video");
      return Number.isFinite(video?.currentTime) ? video.currentTime : 0;
    }

    function setLoadGlbButtonState(state) {
      if (state === "ready") {
        el.loadGlbButton.disabled = false;
        el.loadGlbButton.textContent = "Open interactive 3D";
      } else if (state === "loading") {
        el.loadGlbButton.disabled = true;
        el.loadGlbButton.textContent = "Loading";
      } else if (state === "loaded") {
        el.loadGlbButton.disabled = true;
        el.loadGlbButton.textContent = "Interactive 3D";
      } else {
        el.loadGlbButton.disabled = true;
        el.loadGlbButton.textContent = "Open interactive 3D";
      }
    }

    function showPreviewOnly(embodiment, objectId, episode) {
      loadToken += 1;
      const object = objectData(objectId);
      el.viewerTitle.textContent = `${labels[embodiment] || titleize(embodiment)} / ${object?.name || objectId} / sequence ${episodeTitleLabel(embodiment, objectId, episode)}`;
      if (viewerReady) clearModel();
      showInstantPreview(embodiment, objectId, episode);
      setLoadGlbButtonState("ready");
    }

    async function ensureThreeRuntime() {
      if (!threeRuntimePromise) {
        threeRuntimePromise = Promise.all([
          import("three"),
          import("three/addons/controls/OrbitControls.js"),
          import("three/addons/loaders/GLTFLoader.js"),
          import("three/addons/libs/meshopt_decoder.module.js")
        ]).then(([threeModule, controlsModule, loaderModule, meshoptModule]) => {
          THREE = threeModule;
          OrbitControls = controlsModule.OrbitControls;
          GLTFLoader = loaderModule.GLTFLoader;
          MeshoptDecoder = meshoptModule.MeshoptDecoder;
        });
      }
      return threeRuntimePromise;
    }

    async function initViewer() {
      if (viewerReady) return;
      await ensureThreeRuntime();
      if (viewerReady) return;

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0f141b);
      clock = new THREE.Clock();

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.domElement.tabIndex = 0;
      renderer.domElement.addEventListener("pointerdown", () => {
        renderer.domElement.focus();
        renderer.domElement.style.cursor = "grabbing";
      });
      window.addEventListener("pointerup", () => {
        renderer.domElement.style.cursor = "grab";
      });
      renderer.domElement.addEventListener("contextmenu", event => event.preventDefault());
      el.viewer.appendChild(renderer.domElement);

      camera = new THREE.PerspectiveCamera(45, 1, 0.001, 1000);
      camera.position.set(1.4, 0.9, 1.4);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.enablePan = true;
      controls.enableRotate = true;
      controls.enableZoom = true;
      controls.screenSpacePanning = true;
      controls.target.set(0, 0, 0);
      controls.mouseButtons = {
        LEFT: THREE.MOUSE.ROTATE,
        MIDDLE: THREE.MOUSE.DOLLY,
        RIGHT: THREE.MOUSE.PAN
      };
      controls.touches = {
        ONE: THREE.TOUCH.ROTATE,
        TWO: THREE.TOUCH.DOLLY_PAN
      };
      controls.addEventListener("start", () => {
        el.viewerStatus.textContent = "Interacting";
      });
      controls.addEventListener("end", () => {
        el.viewerStatus.textContent = "Ready";
      });

      scene.add(new THREE.HemisphereLight(0xffffff, 0x7b8492, 2.4));
      const keyLight = new THREE.DirectionalLight(0xffffff, 2.2);
      keyLight.position.set(3, 5, 4);
      scene.add(keyLight);

      new ResizeObserver(resizeViewer).observe(el.viewer);
      window.addEventListener("resize", resizeViewer);
      resizeViewer();
      viewerReady = true;
      animate();
    }

    function resizeViewer() {
      if (!renderer || !camera) return;
      const rect = el.viewer.getBoundingClientRect();
      const width = Math.max(1, Math.floor(rect.width));
      const height = Math.max(1, Math.floor(rect.height));
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height, false);
    }

    function clearModel() {
      if (!model) return;
      scene.remove(model);
      model.traverse(node => {
        if (node.geometry) node.geometry.dispose();
        if (node.material) {
          const materials = Array.isArray(node.material) ? node.material : [node.material];
          materials.forEach(material => material.dispose?.());
        }
      });
      model = null;
      mixer = null;
      animationDuration = 0;
      animationClipDuration = 0;
      animationTrim = null;
      animationTrackData = [];
    }

    async function openGlbCache() {
      if (!("caches" in window)) return null;
      try {
        return await caches.open(GLB_CACHE_NAME);
      } catch (error) {
        console.warn(error);
        return null;
      }
    }

    async function cachedGlbBlob(url) {
      const cache = await openGlbCache();
      if (!cache) return null;
      const cached = await cache.match(url);
      return cached ? cached.blob() : null;
    }

    async function storeGlbBlob(url, blob, headers = new Headers()) {
      const cache = await openGlbCache();
      if (!cache) return;
      const responseHeaders = new Headers(headers);
      if (!responseHeaders.has("content-type")) {
        responseHeaders.set("content-type", blob.type || "model/gltf-binary");
      }
      await cache.put(
        url,
        new Response(blob.slice(0, blob.size, blob.type), {
          status: 200,
          statusText: "OK",
          headers: responseHeaders
        })
      );
    }

    async function downloadGlbBlob(url, priority = "high") {
      const response = await fetch(url, { mode: "cors", priority });
      if (!response.ok) throw new Error(`GLB request failed: ${response.status}`);
      const headers = response.headers;
      const blob = await response.blob();
      storeGlbBlob(url, blob, headers).catch(error => console.warn(error));
      return blob;
    }

    async function glbBlob(url, priority = "high") {
      const cached = await cachedGlbBlob(url);
      if (cached) return { blob: cached, source: "cache" };

      if (!inflightGlbBlobs.has(url)) {
        inflightGlbBlobs.set(
          url,
          downloadGlbBlob(url, priority).finally(() => {
            inflightGlbBlobs.delete(url);
          })
        );
      }

      return {
        blob: await inflightGlbBlobs.get(url),
        source: "network"
      };
    }

    function cameraPresetFor(embodiment) {
      return CAMERA_PRESETS[embodiment] || CAMERA_PRESETS.default;
    }

    function frameObject(object, embodiment) {
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      const distance = maxDim / (2 * Math.tan(THREE.MathUtils.degToRad(camera.fov) / 2));
      const viewDirection = new THREE.Vector3(...CAMERA_VIEW_DIRECTION).normalize();
      const preset = cameraPresetFor(embodiment);
      const focus = new THREE.Vector3(
        maxDim * preset.focus[0],
        maxDim * preset.focus[1],
        maxDim * preset.focus[2]
      );

      object.position.sub(center);
      controls.target.copy(focus);
      camera.near = Math.max(maxDim / 1000, 0.001);
      camera.far = Math.max(maxDim * 100, 100);
      camera.position.copy(focus).addScaledVector(viewDirection, distance * preset.distanceScale);
      camera.updateProjectionMatrix();
      controls.update();
      resizeViewer();
    }

    function normalizeAnimationTrim(trim, clipDuration) {
      if (!trim || !clipDuration) return null;
      const start = Math.max(0, Math.min(trim.start || 0, clipDuration));
      const end = Math.max(start, Math.min(trim.end || clipDuration, clipDuration));
      return end - start > 0.001 ? { start, end } : null;
    }

    function wrapTime(value, duration) {
      if (!duration) return value;
      return ((value % duration) + duration) % duration;
    }

    function sourceAnimationTime(trimmedTime) {
      const start = animationTrim?.start || 0;
      return start + wrapTime(trimmedTime, animationDuration);
    }

    function trackTargetNodeName(trackName) {
      const dotIndex = trackName.lastIndexOf(".");
      return (dotIndex === -1 ? trackName : trackName.slice(0, dotIndex)).replace(/^\//, "");
    }

    function boundsForNode(node) {
      if (!node) return null;
      const box = new THREE.Box3().setFromObject(node);
      if (box.isEmpty()) return null;
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      return {
        min: box.min.toArray(),
        max: box.max.toArray(),
        center: center.toArray(),
        size: size.toArray()
      };
    }

    function motionRoleForNode(nodeName) {
      const lowerName = (nodeName || "").toLowerCase();
      if (!lowerName || lowerName.includes("floor")) return "ignore";
      if (lowerName.startsWith("object_") || lowerName.includes("object")) return "object";
      if (lowerName.includes("human") || lowerName.includes("mano") || lowerName.includes("hand")) return "hand";
      if (lowerName.includes("robot")) return "robot";
      return "unknown";
    }

    function enforceAnimationTrim() {
      if (!mixer || !animationTrim || !animationDuration) return;
      if (mixer.time < animationTrim.start || mixer.time >= animationTrim.end) {
        mixer.setTime(animationTrim.start + wrapTime(mixer.time - animationTrim.start, animationDuration));
      }
    }

    function playAnimations(gltf, loadedModel, trim = null) {
      const clips = gltf.animations || [];
      animationTrackData = clips.flatMap(clip => clip.tracks.map(track => ({
        name: track.name,
        nodeName: trackTargetNodeName(track.name),
        role: motionRoleForNode(trackTargetNodeName(track.name)),
        bounds: boundsForNode(loadedModel.getObjectByName(trackTargetNodeName(track.name))),
        valueSize: track.getValueSize(),
        times: Array.from(track.times),
        values: Array.from(track.values)
      })));
      if (!clips.length) {
        el.viewerStatus.textContent = "Ready";
        animationDuration = 0;
        animationClipDuration = 0;
        animationTrim = null;
        return;
      }

      mixer = new THREE.AnimationMixer(loadedModel);
      animationClipDuration = Math.max(...clips.map(clip => clip.duration || 0));
      animationTrim = normalizeAnimationTrim(trim, animationClipDuration);
      animationDuration = animationTrim ? animationTrim.end - animationTrim.start : animationClipDuration;
      for (const clip of clips) {
        const action = mixer.clipAction(clip);
        action.reset();
        action.setLoop(THREE.LoopRepeat, Infinity);
        action.play();
      }
      mixer.setTime(sourceAnimationTime(0));
      el.viewerStatus.textContent = `${clips.length} animation${clips.length === 1 ? "" : "s"}`;
    }

    function syncAnimationToPreview() {
      if (!mixer || !animationDuration) return;
      mixer.setTime(sourceAnimationTime(currentPreviewTime()));
      controls?.update();
      renderer?.render(scene, camera);
    }

    function setAnimationTime(time) {
      if (!mixer || !renderer || !scene || !camera) return false;
      mixer.timeScale = 1;
      mixer.setTime(animationDuration ? sourceAnimationTime(time) : time);
      mixer.timeScale = 0;
      controls?.update();
      renderer.render(scene, camera);
      return true;
    }

    function setSourceAnimationTime(time) {
      if (!mixer || !renderer || !scene || !camera) return false;
      mixer.timeScale = 1;
      mixer.setTime(Math.max(0, Math.min(time, animationClipDuration || time)));
      mixer.timeScale = 0;
      controls?.update();
      renderer.render(scene, camera);
      return true;
    }

    function createGltfLoader() {
      const loader = new GLTFLoader();
      if (MeshoptDecoder) loader.setMeshoptDecoder(MeshoptDecoder);
      return loader;
    }

    function parseGltf(arrayBuffer, url) {
      return new Promise((resolve, reject) => {
        const resourcePath = url.slice(0, url.lastIndexOf("/") + 1);
        createGltfLoader().parse(arrayBuffer, resourcePath, resolve, reject);
      });
    }

    async function loadViewer(embodiment, objectId, episode) {
      const token = ++loadToken;
      const object = objectData(objectId);
      el.viewerTitle.textContent = `${labels[embodiment] || titleize(embodiment)} / ${object?.name || objectId} / sequence ${episodeTitleLabel(embodiment, objectId, episode)}`;
      showInstantPreview(embodiment, objectId, episode);
      setLoadGlbButtonState("loading");

      const asset = glbAssetFor(embodiment, objectId, episode);
      const glbPromise = glbBlob(asset.url, "high");

      try {
        await initViewer();
      } catch (error) {
        glbPromise.catch(() => {});
        if (token === loadToken) {
          el.viewerStatus.textContent = "Viewer failed to load";
          setLoadGlbButtonState("ready");
        }
        console.error(error);
        return;
      }

      if (token !== loadToken) {
        glbPromise.catch(() => {});
        return;
      }
      clearModel();
      el.viewerStatus.textContent = "Fetching GLB";

      try {
        const { blob, source } = await glbPromise;
        if (token !== loadToken) return;
        el.viewerStatus.textContent = source === "cache" ? "Parsing cached GLB" : "Parsing GLB";
        const arrayBuffer = await blob.arrayBuffer();
        if (token !== loadToken) return;
        el.viewerStatus.textContent = "Parsing GLB";
        const gltf = await parseGltf(arrayBuffer, asset.originalUrl);
        if (token !== loadToken) return;
        const loadedModel = gltf.scene;
        loadedModel.rotation.set(-Math.PI / 2, 0, 0);
        loadedModel.updateMatrixWorld(true);
        scene.add(loadedModel);
        model = loadedModel;
        frameObject(loadedModel, embodiment);
        playAnimations(gltf, loadedModel, animationTrimFor(embodiment, objectId, episode));
        syncAnimationToPreview();
        hideInstantPreview();
        setLoadGlbButtonState("loaded");
      } catch (error) {
        if (token === loadToken) {
          el.viewerStatus.textContent = "Load failed";
          setLoadGlbButtonState("ready");
        }
        console.error(error);
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      if (mixer) {
        mixer.update(delta);
        enforceAnimationTrim();
      }
      controls.update();
      renderer.render(scene, camera);
    }

    window.__hrdexdbPreviewCapture = {
      setTime: setAnimationTime,
      setSourceTime: setSourceAnimationTime,
      tracks() {
        return animationTrackData;
      },
      state() {
        return {
          loaded: !!model,
          duration: animationDuration,
          clipDuration: animationClipDuration,
          time: mixer?.time || 0,
          trim: animationTrim,
          viewerReady
        };
      },
      viewerBox() {
        const rect = el.viewer.getBoundingClientRect();
        return {
          x: Math.round(rect.x),
          y: Math.round(rect.y),
          width: Math.round(rect.width),
          height: Math.round(rect.height)
        };
      }
    };

    el.search.addEventListener("input", event => {
      const query = event.target.value.trim().toLowerCase();
      filteredObjects = objects.filter(object => `${object.id} ${object.name}`.toLowerCase().includes(query));
      renderGallery();
    });

    el.backButton.addEventListener("click", openGallery);
    el.galleryNav.addEventListener("click", openGallery);
    el.loadGlbButton.addEventListener("click", () => {
      if (!currentObject || !currentEmbodiment || !currentEpisode) return;
      loadViewer(currentEmbodiment, currentObject, currentEpisode);
    });
    el.objectSelect.addEventListener("change", event => {
      openDetail(event.target.value);
    });

    window.addEventListener("error", event => {
      if (viewerReady) el.viewerStatus.textContent = event.message ? "Viewer error" : "Viewer error";
    });
    window.addEventListener("unhandledrejection", () => {
      if (viewerReady) el.viewerStatus.textContent = "Viewer error";
    });
  </script>
</body>
</html>
