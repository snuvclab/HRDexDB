<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HRDexDB Objects</title>
  <link rel="preconnect" href="https://huggingface.co" crossorigin>
  <link rel="preconnect" href="https://cdn-lfs.huggingface.co" crossorigin>
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="dns-prefetch" href="//huggingface.co">
  <link rel="dns-prefetch" href="//cdn-lfs.huggingface.co">
  <link rel="dns-prefetch" href="//unpkg.com">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #faf8f5;
      --surface: #ffffff;
      --surface-2: #f1ece5;
      --object-panel: #faf8f5;
      --viewer-bg: #f4efe8;
      --border: #ece7e0;
      --text: #2b2722;
      --text-muted: #8a8178;
      --accent: #e2603b;
      --accent-hover: #c94f30;
      --green: #6fae58;
      --red: #d9584a;
      --radius: 8px;
      --shadow-soft: 0 1px 2px rgba(40, 30, 20, 0.04);
      --shadow-lift: 0 14px 30px rgba(40, 30, 20, 0.10);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }
    button, input, select { font: inherit; }
    button { cursor: pointer; }

    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 24px;
      min-height: 53px;
      padding: 12px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      display: inline-flex;
      align-items: center;
      flex: 0 0 auto;
      white-space: nowrap;
    }

    .nav-logo img {
      display: block;
      width: auto;
      height: 30px;
      max-width: min(42vw, 184px);
      object-fit: contain;
    }

    .nav-links {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
      margin-left: auto;
    }

    .nav-link {
      padding: 8px 13px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      line-height: 1;
      text-decoration: none;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--text);
      background: var(--surface-2);
    }

    .nav-link.cta {
      background: var(--accent);
      color: #ffffff;
      box-shadow: 0 1px 2px rgba(226, 96, 59, 0.25);
    }

    .nav-link.cta:hover,
    .nav-link.cta.active {
      background: var(--accent-hover);
      color: #ffffff;
    }

    .container {
      max-width: 1480px;
      margin: 0 auto;
      padding: 24px;
    }

    #gallery-view {
      max-width: 1200px;
      margin: 0 auto;
    }

    .view { display: none; }
    .view.active { display: block; }

    .gallery-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 18px;
      padding: 12px 0 26px;
    }

    .gallery-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .gallery-brand h1 {
      font-size: 26px;
      font-weight: 700;
      line-height: 1.2;
    }

    .gallery-hint {
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 500;
      line-height: 1.2;
      white-space: nowrap;
    }

    .count {
      padding: 5px 12px;
      border-radius: 999px;
      background: #fdeee9;
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      white-space: nowrap;
    }

    .gallery-controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap .kbd {
      position: absolute;
      top: 50%;
      right: 14px;
      padding: 1px 6px;
      transform: translateY(-50%);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 11px;
      line-height: 1.4;
      pointer-events: none;
    }

    .search-bar {
      width: 100%;
      min-height: 42px;
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      background: var(--surface);
      color: var(--text);
      font-size: 1em;
      box-shadow: var(--shadow-soft);
    }

    .search-bar { margin-bottom: 16px; }
    .gallery-header .search-bar {
      width: 270px;
      margin-bottom: 0;
      padding-right: 40px;
      border-radius: 999px;
    }
    .search-bar:focus {
      border-color: var(--accent);
      box-shadow: 0 2px 10px rgba(226, 96, 59, 0.16);
    }
    .search-bar::placeholder { color: var(--text-muted); }

    .sort-select {
      min-height: 42px;
      padding: 11px 16px;
      border: 1px solid var(--border);
      border-radius: 999px;
      outline: none;
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow-soft);
      font: inherit;
      font-size: 14px;
      cursor: pointer;
    }

    .sort-select:focus {
      border-color: var(--accent);
    }

    .stats-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 16px;
      color: var(--text-muted);
      font-size: 0.9em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 16px;
    }

    #gallery-view .grid {
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 22px;
      padding: 8px 0 72px;
    }

    .grid-item,
    .episode-card,
    .viewer-panel {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow-soft);
    }

    .grid-item,
    .episode-card {
      width: 100%;
      color: var(--text);
      text-align: left;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.22s ease;
    }

    .grid-item {
      cursor: pointer;
      border-radius: 18px;
    }

    .grid-item:hover,
    .episode-card:hover,
    .episode-card.active {
      border-color: var(--accent);
      box-shadow: var(--shadow-lift);
    }

    .grid-item:hover {
      transform: translateY(-2px);
    }

    .episode-card.active {
      position: relative;
    }

    #gallery-view .grid-item:hover {
      transform: translateY(-4px);
    }

    .thumb-slot,
    .episode-thumb {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }

    .thumb-slot {
      background: var(--object-panel);
    }

    #gallery-view .thumb-slot {
      border-bottom: 0;
    }

    .episode-thumb {
      background:
        linear-gradient(135deg, rgba(226, 96, 59, 0.12), rgba(253, 238, 233, 0.82)),
        radial-gradient(circle at 30% 20%, rgba(226, 96, 59, 0.14), transparent 34%),
        var(--surface-2);
    }

    .thumb-slot {
      aspect-ratio: 1;
    }

    .episode-thumb {
      aspect-ratio: 16 / 9;
    }

    .episode-thumb img,
    .episode-thumb video {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: var(--surface-2);
    }

    .episode-thumb::after {
      position: absolute;
      inset: 0;
      content: "";
      opacity: 0.55;
      background-image:
        linear-gradient(135deg, rgba(43, 39, 34, 0.04) 25%, transparent 25%, transparent 50%, rgba(43, 39, 34, 0.04) 50%, rgba(43, 39, 34, 0.04) 75%, transparent 75%, transparent);
      background-size: 18px 18px;
    }

    .thumb-slot img {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: var(--object-panel);
    }

    .thumb-slot.thumb-missing img {
      display: none;
    }

    .episode-num {
      position: relative;
      z-index: 1;
      color: rgba(43, 39, 34, 0.78);
      font-weight: 800;
      letter-spacing: 0;
    }

    .episode-num { font-size: 1.35rem; }

    .episode-thumb img + .episode-num,
    .episode-thumb video + .episode-num {
      display: none;
    }

    .episode-thumb.thumb-missing .episode-num {
      display: block;
    }

    .grid-item .label {
      padding: 13px 16px 0;
      overflow: hidden;
      font-size: 15px;
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .hands-info {
      padding: 0 16px 16px;
      overflow: hidden;
      color: var(--text-muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .detail-shell {
      display: grid;
      grid-template-columns: minmax(190px, 240px) minmax(0, 1fr);
      align-items: start;
      gap: 24px;
    }

    .object-sidebar {
      position: sticky;
      top: 73px;
      max-height: calc(100vh - 96px);
      overflow: hidden;
    }

    .object-menu-search {
      width: 100%;
      min-height: 42px;
      margin-bottom: 12px;
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 999px;
      outline: none;
      background: var(--surface);
      color: var(--text);
      font-size: 0.9em;
      box-shadow: var(--shadow-soft);
    }

    .object-menu-search:focus {
      border-color: var(--accent);
    }

    .object-menu-search::placeholder {
      color: var(--text-muted);
    }

    .object-menu {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: max-content;
      align-content: start;
      gap: 8px;
      max-height: calc(100vh - 144px);
      overflow-y: auto;
      padding-right: 4px;
      scrollbar-color: var(--border) transparent;
    }

    .object-menu .empty-state {
      grid-column: 1 / -1;
      padding: 24px 8px;
    }

    .object-menu-card {
      width: 100%;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
      color: var(--text);
      text-align: left;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.22s ease;
    }

    .object-menu-card:hover,
    .object-menu-card.active {
      border-color: var(--accent);
    }

    .object-menu-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lift);
    }

    .object-menu-card .thumb-slot {
      aspect-ratio: 1;
      border-bottom: 0;
    }

    .object-menu-label {
      padding: 8px 10px 0;
      overflow: hidden;
      font-size: 0.78em;
      font-weight: 600;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .object-menu-hands {
      padding: 0 10px 10px;
      overflow: hidden;
      color: var(--text-muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.62em;
      line-height: 1.3;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .detail-main {
      min-width: 0;
    }

    .object-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .object-header h1 {
      font-size: 1.8em;
      line-height: 1.2;
    }

    .object-subtitle {
      margin-top: 4px;
      color: var(--text-muted);
      font-size: 0.9em;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      margin-bottom: 20px;
      overflow: visible;
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      flex: 0 0 auto;
      padding: 10px 18px;
      border: 0;
      border-bottom: 2px solid transparent;
      background: none;
      color: var(--text-muted);
      font-size: 0.95em;
      font-weight: 700;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab:hover { color: var(--text); }
    .tab.active {
      border-bottom-color: var(--accent);
      color: var(--text);
    }

    .sequence-toolbar {
      display: none;
      justify-content: flex-end;
      margin-bottom: 16px;
    }

    .episode-count {
      color: var(--text-muted);
      font-size: 0.9em;
      text-align: right;
    }

    .detail-layout {
      display: grid;
      grid-template-columns: minmax(260px, 360px) minmax(420px, 1fr);
      align-items: start;
      gap: 16px;
    }

    .episode-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: max-content;
      gap: 12px;
    }

    @media (min-width: 901px) {
      #detail-view.active {
        height: calc(100vh - 104px);
        overflow: hidden;
      }

      #detail-view.active .detail-shell {
        align-items: stretch;
        height: 100%;
      }

      #detail-view.active .object-sidebar {
        display: flex;
        flex-direction: column;
        height: 100%;
        max-height: none;
      }

      #detail-view.active .object-menu {
        flex: 1 1 auto;
        min-height: 0;
        max-height: none;
      }

      #detail-view.active .detail-main {
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
        overflow: hidden;
      }

      #detail-view.active .detail-layout {
        flex: 1 1 auto;
        align-items: stretch;
        min-height: 0;
      }

      #detail-view.active .episode-grid {
        height: 100%;
        min-height: 0;
        max-height: none;
        overflow-y: auto;
        align-content: start;
        padding-right: 4px;
        scrollbar-color: var(--border) transparent;
      }

      #detail-view.active .viewer-panel {
        position: relative;
        top: auto;
        align-self: stretch;
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
      }

      #detail-view.active #viewer {
        flex: 1 1 auto;
        height: auto;
        min-height: 0;
      }

      #detail-view.active .viewer-panel.preview-mode {
        align-self: stretch;
        height: 100%;
      }

      #detail-view.active .viewer-panel.preview-mode .viewer-preview {
        inset: 0 0 14px;
        background: var(--viewer-bg);
      }

      #detail-view.active .viewer-panel.preview-mode .viewer-video-shell.active {
        display: block;
      }

      #detail-view.active .viewer-panel.preview-mode .viewer-video-shell video {
        object-fit: contain;
        background: #000000;
      }
    }

    .episode-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
    }

    .badge {
      display: inline-flex;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75em;
      font-weight: 700;
      line-height: 1;
    }

    .badge-rank {
      padding: 0;
      border-radius: 0;
      background: transparent;
      color: var(--text);
      font-weight: 800;
    }

    .badge-result {
      justify-content: center;
      min-width: 64px;
      color: #ffffff;
      text-transform: lowercase;
    }

    .badge-placeholder {
      visibility: hidden;
    }

    .badge-success {
      background: var(--green);
    }

    .badge-fail {
      background: var(--red);
    }

    .viewer-panel {
      position: sticky;
      top: 73px;
      min-width: 0;
      min-height: 520px;
    }

    .viewer-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      height: 51px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    .viewer-title {
      min-width: 0;
      overflow: hidden;
      font-size: 0.92em;
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewer-status {
      overflow: hidden;
      color: var(--text-muted);
      font-size: 0.78em;
      text-align: right;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewer-actions {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .load-glb-button {
      flex: 0 0 auto;
      width: 148px;
      min-height: 30px;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface-2);
      color: var(--text);
      font-size: 0.78em;
      font-weight: 700;
    }

    .load-glb-button:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent-hover);
      background: #fdeee9;
    }

    .load-glb-button:disabled {
      cursor: default;
      opacity: 0.62;
    }

    #viewer {
      position: relative;
      overflow: hidden;
      height: min(68vh, 720px);
      min-height: 474px;
      background: var(--viewer-bg);
    }

    #viewer canvas {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
      cursor: grab;
      touch-action: none;
    }

    #viewer.preview-active canvas {
      visibility: hidden;
    }

    .reset-view-button {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 3;
      min-height: 30px;
      padding: 5px 10px;
      border: 1px solid rgba(236, 231, 224, 0.92);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.84);
      color: var(--text);
      font-size: 0.78em;
      font-weight: 700;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(8px);
    }

    .reset-view-button:hover {
      border-color: var(--accent);
      color: var(--accent-hover);
      background: #fdeee9;
    }

    .reset-view-button[hidden],
    #viewer.preview-active .reset-view-button {
      display: none;
    }

    .viewer-preview {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--viewer-bg);
    }

    .viewer-preview.active {
      display: flex;
    }

    .viewer-preview > img,
    .viewer-video-shell {
      width: 100%;
      height: 100%;
    }

    .viewer-preview > img,
    .viewer-video-shell video {
      object-fit: contain;
      background: var(--viewer-bg);
    }

    .viewer-video-shell {
      position: relative;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .viewer-video-shell.active {
      display: flex;
    }

    .viewer-video-shell video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .viewer-video-thumb {
      z-index: 2;
      pointer-events: none;
      transition: opacity 0.16s ease;
    }

    .viewer-video-shell.ready .viewer-video-thumb {
      opacity: 0;
      visibility: hidden;
    }

    .loading,
    .empty-state {
      padding: 48px 24px;
      color: var(--text-muted);
      text-align: center;
    }

    @media (max-width: 900px) {
      .detail-shell,
      .detail-layout {
        grid-template-columns: 1fr;
      }

      .episode-count { text-align: left; }
      .sequence-toolbar { justify-content: flex-start; }
      .object-sidebar {
        position: static;
        max-height: 330px;
      }
      .object-menu {
        max-height: 282px;
        padding-right: 0;
      }
      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .viewer-panel {
        position: static;
        order: -1;
      }
    }

    @media (max-width: 640px) {
      .nav {
        gap: 16px;
        padding: 12px 16px;
      }

      .container { padding: 18px 14px; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .object-header { display: block; }
      #viewer {
        height: 62vh;
        min-height: 360px;
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav-logo" href="gallery-index.html" aria-label="HRDexDB home">
      <img src="static/image/hrdexdb_logo.png" alt="HRDexDB">
    </a>
    <div class="nav-links">
      <a class="nav-link" href="gallery-index.html">Overview</a>
      <a class="nav-link" href="https://snuvclab.github.io/HRDexDB/">Project</a>
      <a class="nav-link" href="./static/pdf/hrdexdb.pdf" target="_blank" rel="noreferrer">Paper</a>
      <a class="nav-link" href="https://github.com/snuvclab/HRDexDB" target="_blank" rel="noreferrer">Code</a>
      <a class="nav-link" href="https://huggingface.co/datasets/HRDexDB/HRDexDB" target="_blank" rel="noreferrer">Data</a>
      <button class="nav-link cta" id="gallery-nav" type="button">Gallery</button>
    </div>
  </nav>

  <main class="container">
    <section class="view active" id="gallery-view">
      <header class="gallery-header">
        <div class="gallery-brand">
          <h1>Object Gallery</h1>
          <span class="count" id="stats">Loading...</span>
          <span class="gallery-hint">click for visualization</span>
        </div>
        <div class="gallery-controls">
          <div class="search-wrap">
            <input type="search" class="search-bar" id="search" placeholder="Search objects…" autocomplete="off">
            <span class="kbd">/</span>
          </div>
          <select class="sort-select" id="sort">
            <option value="az">Name A → Z</option>
            <option value="za">Name Z → A</option>
          </select>
        </div>
      </header>
      <div class="grid" id="grid"></div>
    </section>

    <section class="view" id="detail-view">
      <div class="detail-shell">
        <aside class="object-sidebar">
          <input type="search" class="object-menu-search" id="object-menu-search" placeholder="Search objects" autocomplete="off">
          <div class="object-menu" id="object-menu"></div>
        </aside>

        <div class="detail-main">
          <div class="object-header">
            <div>
              <h1 id="object-title"></h1>
              <p class="object-subtitle" id="object-subtitle"></p>
            </div>
          </div>

          <div class="tabs" id="embodiment-tabs"></div>

          <div class="sequence-toolbar">
            <div class="episode-count" id="episode-count"></div>
          </div>

          <div class="detail-layout">
            <div class="episode-grid" id="episode-grid"></div>
            <aside class="viewer-panel">
              <div class="viewer-meta">
                <div class="viewer-title" id="viewer-title">Select a sequence</div>
                <div class="viewer-actions">
                  <div class="viewer-status" id="viewer-status">Idle</div>
                  <button class="load-glb-button" id="load-glb-button" type="button" disabled>Open interactive 3D</button>
                </div>
              </div>
              <div id="viewer">
                <button class="reset-view-button" id="reset-view-button" type="button" hidden>Reset view</button>
              </div>
            </aside>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script>
    const CATALOG_URL = "https://huggingface.co/spaces/HRDexDB/HRDexDB-Visualizer/raw/main/assets/glb_catalog.json";
    const GLB_BASE = "https://huggingface.co/datasets/HRDexDB/HRDexDB-glb/resolve/main";
    const PREVIEW_VIDEO_BASE = "https://huggingface.co/datasets/HRDexDB/HRDexDB-preview-video/resolve/main";
    const PREVIEW_CAMERA_ID = "23263780";
    const PREVIEW_VIDEO_CACHE_LIMIT = 24;
    const PREVIEW_WARM_COUNT = 6;
    const THUMB_BASE = "static/gallery-object-thumbs";
    const THUMB_FALLBACK_BASE = "https://willi19.github.io/object_processing/objects";
    const THUMB_VERSION = "object-processing-24";
    const GLB_CACHE_NAME = "hrdexdb-original-glb-v1";
    const ANIMATION_TRIMS_URL = "static/gallery-animation-trims.json";
    const GRASP_RESULT_MANIFEST_URL = "static/gallery-grasp-results/manifest.json";
    const INTERACTIVE_3D_VISIBILITY_URL = "static/gallery-interactive-3d-visibility.json";
    const ANIMATION_TRIMS = {};
    const GRASP_RESULTS = {};
    const INTERACTIVE_3D_VISIBILITY = {};
    const ROBOT_SPACE_GRAY_COLOR = 0xa8adb4;
    const OBJECT_DEFAULT_BEIGE_COLOR = 0xd9c7aa;
    const CAMERA_PRESETS = {
      default: {
        focus: [-0.07, -0.10, -0.02],
        viewDirection: [0, 0.36, -1.04]
      },
      human: {
        focus: [0, 0.08, -0.17],
        viewDirection: [0, 0.52, -1.51]
      },
      allegro_v5: {
        focus: [0.04, -0.15, -0.01],
        viewDirection: [0, 0.56, -1.37]
      },
      inspire_f1: {
        focus: [0.05, -0.14, -0.07],
        viewDirection: [0, 0.36, -0.8]
      }
    };
    const CAMERA_DISTANCE_SCALE = 0.3;
    const CAMERA_FOV = 45;
    const VIEW_ZOOM_MIN_SCALE = 1.5;
    const VIEW_ZOOM_MAX_SCALE = 3;
    const VIEW_ZOOM_APPLE_CENTER_Y = 0.041751;
    const VIEW_ZOOM_GREEN_CACTUS_VASE_CENTER_Y = 0.131355;
    const VIEW_ZOOM_GREEN_CACTUS_VASE_SCALE = 2;
    const DEFAULT_VIEW_ZOOM_SCALE = VIEW_ZOOM_MIN_SCALE;

    let catalog = {};
    let objects = [];
    let filteredObjects = [];
    let detailObjectQuery = "";
    let objectMenuRenderKey = "";
    let animationTrims = ANIMATION_TRIMS;
    let graspResults = GRASP_RESULTS;
    let interactive3DVisibility = INTERACTIVE_3D_VISIBILITY;
    let currentObject = null;
    let currentEmbodiment = null;
    let currentEpisode = null;
    let viewerZoomScale = DEFAULT_VIEW_ZOOM_SCALE;
    let viewerAutoZoomScale = DEFAULT_VIEW_ZOOM_SCALE;
    let viewerObjectCenterY = null;

    let THREE;
    let OrbitControls;
    let GLTFLoader;
    let MeshoptDecoder;
    let threeRuntimePromise;
    let scene;
    let camera;
    let renderer;
    let controls;
    let clock;
    let mixer = null;
    let model = null;
    let previewLayer = null;
    let activePreviewShell = null;
    let animationDuration = 0;
    let animationClipDuration = 0;
    let animationTrim = null;
    let animationTrackData = [];
    let viewerReady = false;
    let loadToken = 0;
    let previewWarmTimer = null;
    let previewWarmToken = 0;
    const inflightGlbBlobs = new Map();
    const previewVideoShells = new Map();

    const labels = {
      allegro_v5: "Allegro V5",
      human: "Human",
      inspire_f1: "Inspire F1"
    };
    const cardLabels = {
      allegro_v5: "allegro",
      human: "human",
      inspire_f1: "inspire"
    };
    const embodimentOrder = ["human", "allegro_v5", "inspire_f1"];
    const robotEmbodiments = new Set(["allegro_v5", "inspire_f1"]);

    const el = {
      galleryView: document.getElementById("gallery-view"),
      detailView: document.getElementById("detail-view"),
      galleryNav: document.getElementById("gallery-nav"),
      search: document.getElementById("search"),
      sort: document.getElementById("sort"),
      stats: document.getElementById("stats"),
      grid: document.getElementById("grid"),
      objectTitle: document.getElementById("object-title"),
      objectSubtitle: document.getElementById("object-subtitle"),
      embodimentTabs: document.getElementById("embodiment-tabs"),
      objectMenuSearch: document.getElementById("object-menu-search"),
      objectMenu: document.getElementById("object-menu"),
      episodeCount: document.getElementById("episode-count"),
      episodeGrid: document.getElementById("episode-grid"),
      viewerPanel: document.querySelector(".viewer-panel"),
      viewer: document.getElementById("viewer"),
      viewerTitle: document.getElementById("viewer-title"),
      viewerStatus: document.getElementById("viewer-status"),
      resetViewButton: document.getElementById("reset-view-button"),
      loadGlbButton: document.getElementById("load-glb-button")
    };

    init();

    async function init() {
      try {
        const [response, animationTrimManifest, graspResultManifest, interactive3DVisibilityManifest] = await Promise.all([
          fetch(CATALOG_URL),
          loadAnimationTrimManifest(),
          loadGraspResultManifest(),
          loadInteractive3DVisibilityManifest()
        ]);
        if (!response.ok) throw new Error(`Catalog request failed: ${response.status}`);
        catalog = await response.json();
        applyAnimationTrimManifest(animationTrimManifest);
        applyGraspResultManifest(graspResultManifest);
        applyInteractive3DVisibilityManifest(interactive3DVisibilityManifest);
        objects = buildObjects(catalog);
        applyGalleryFilters();
        currentObject = objects[0]?.id || null;
        renderGallery();
        loadHashState();
      } catch (error) {
        el.stats.textContent = "Could not load the catalog.";
        el.grid.innerHTML = `
          <div class="empty-state">
            Could not load the HRDexDB GLB catalog.<br>
            <a href="${CATALOG_URL}" target="_blank" rel="noreferrer">Open catalog source</a>
          </div>`;
        console.error(error);
      }
    }

    async function loadAnimationTrimManifest() {
      try {
        const response = await fetch(ANIMATION_TRIMS_URL, { cache: "no-cache" });
        if (!response.ok) return null;
        return response.json();
      } catch (error) {
        console.warn(error);
        return null;
      }
    }

    async function loadGraspResultManifest() {
      try {
        const response = await fetch(GRASP_RESULT_MANIFEST_URL, { cache: "no-cache" });
        if (!response.ok) return null;
        return response.json();
      } catch (error) {
        console.warn(error);
        return null;
      }
    }

    async function loadInteractive3DVisibilityManifest() {
      try {
        const response = await fetch(INTERACTIVE_3D_VISIBILITY_URL, { cache: "no-cache" });
        if (!response.ok) return null;
        return response.json();
      } catch (error) {
        console.warn(error);
        return null;
      }
    }

    function applyAnimationTrimManifest(manifest) {
      animationTrims = { ...ANIMATION_TRIMS, ...(manifest?.trims || {}) };
    }

    function applyGraspResultManifest(manifest) {
      graspResults = { ...GRASP_RESULTS, ...(manifest?.results || {}) };
    }

    function applyInteractive3DVisibilityManifest(manifest) {
      interactive3DVisibility = { ...INTERACTIVE_3D_VISIBILITY, ...(manifest?.interactive3D || {}) };
    }

    function buildObjects(source) {
      const objectIds = Array.from(
        new Set(Object.values(source).flatMap(objectsByEmbodiment => Object.keys(objectsByEmbodiment)))
      ).sort();

      return objectIds.map(id => {
        const embodiments = {};
        let totalEpisodes = 0;
        for (const [embodiment, objectsByEmbodiment] of Object.entries(source)) {
          const episodes = objectsByEmbodiment[id] || [];
          if (episodes.length) {
            embodiments[embodiment] = episodes.length;
            totalEpisodes += episodes.length;
          }
        }
        return {
          id,
          name: titleize(id),
          embodiments,
          totalEpisodes
        };
      });
    }

    function titleize(value) {
      return value
        .replace(/_/g, " ")
        .replace(/\b\w/g, letter => letter.toUpperCase());
    }

    function objectData(objectId) {
      return objects.find(object => object.id === objectId) || null;
    }

    function orderedEmbodiments(keys) {
      const rank = new Map(embodimentOrder.map((embodiment, index) => [embodiment, index]));
      return [...keys].sort((a, b) => (rank.get(a) ?? 99) - (rank.get(b) ?? 99) || a.localeCompare(b));
    }

    function embodimentKeys(objectId) {
      const object = objectData(objectId);
      if (!object) return [];
      return orderedEmbodiments(
        Object.keys(object.embodiments).filter(embodiment => catalog[embodiment]?.[objectId]?.length)
      );
    }

    function episodesFor(objectId, embodiment) {
      return catalog[embodiment]?.[objectId] || [];
    }

    function updateStats(items) {
      const query = el.search.value.trim();
      el.stats.textContent = query ? `${items.length} / ${objects.length}` : `${objects.length} objects`;
    }

    function applyGalleryFilters() {
      const query = el.search.value.trim().toLowerCase();
      const direction = el.sort.value === "za" ? -1 : 1;
      filteredObjects = objects
        .filter(object => !query || `${object.id} ${object.name}`.toLowerCase().includes(query))
        .sort((a, b) => direction * a.name.localeCompare(b.name));
    }

    function renderGallery() {
      updateStats(filteredObjects);

      if (!filteredObjects.length) {
        el.grid.innerHTML = '<div class="empty-state">No objects found.</div>';
        return;
      }

      el.grid.innerHTML = filteredObjects.map(object => {
        return `
          <button class="grid-item" type="button" data-object="${object.id}">
            <div class="thumb-slot">
              ${objectThumbHtml(object)}
            </div>
            <div class="label">${object.name}</div>
            <div class="hands-info">${object.id}</div>
          </button>`;
      }).join("");

      el.grid.querySelectorAll(".grid-item").forEach(card => {
        card.addEventListener("click", () => openDetail(card.dataset.object));
      });
    }

    function renderObjectMenu() {
      if (el.objectMenuSearch.value !== detailObjectQuery) {
        el.objectMenuSearch.value = detailObjectQuery;
      }

      const query = detailObjectQuery.trim().toLowerCase();
      const renderKey = `query:${query}`;
      if (objectMenuRenderKey === renderKey && el.objectMenu.children.length) {
        syncObjectMenuActive();
        return;
      }

      const menuObjects = query
        ? objects.filter(object => `${object.id} ${object.name}`.toLowerCase().includes(query))
        : objects;
      objectMenuRenderKey = renderKey;

      if (!menuObjects.length) {
        el.objectMenu.innerHTML = '<div class="empty-state">No objects found.</div>';
        return;
      }

      el.objectMenu.innerHTML = menuObjects.map(object => `
          <button class="object-menu-card ${object.id === currentObject ? "active" : ""}" type="button" data-object="${object.id}">
            <div class="thumb-slot">
              ${objectMenuThumbHtml(object)}
            </div>
            <div class="object-menu-label">${object.name}</div>
            <div class="object-menu-hands">${object.id}</div>
          </button>
      `).join("");

      el.objectMenu.querySelectorAll(".object-menu-card").forEach(card => {
        card.addEventListener("click", () => openDetail(card.dataset.object, currentEmbodiment));
      });

      syncObjectMenuActive();
    }

    function syncObjectMenuActive() {
      el.objectMenu.querySelectorAll(".object-menu-card").forEach(card => {
        card.classList.toggle("active", card.dataset.object === currentObject);
      });

      el.objectMenu.querySelector(".object-menu-card.active")?.scrollIntoView({
        block: "nearest",
        inline: "nearest"
      });
    }

    function setActiveView(view) {
      const isDetail = view === "detail";
      el.galleryView.classList.toggle("active", !isDetail);
      el.detailView.classList.toggle("active", isDetail);
      el.galleryNav.classList.toggle("active", !isDetail);
    }

    function openGallery() {
      setActiveView("gallery");
      history.replaceState(null, "", "#gallery");
    }

    function openDetail(objectId, embodiment = null, episode = null) {
      const object = objectData(objectId);
      if (!object) return;

      const objectChanged = currentObject !== objectId;
      currentObject = objectId;
      if (objectChanged) {
        detailObjectQuery = "";
        clearPreviewVideoCache();
      }
      const keys = embodimentKeys(objectId);
      currentEmbodiment = keys.includes(embodiment) ? embodiment : keys[0] || null;

      const episodes = episodesFor(currentObject, currentEmbodiment);
      currentEpisode = episodes.includes(episode) ? episode : episodes[0] || null;

      setActiveView("detail");
      writeHash();
      if (currentEpisode) showPreviewOnly(currentEmbodiment, currentObject, currentEpisode);
      requestAnimationFrame(renderDetail);
    }

    function renderDetail() {
      const object = objectData(currentObject);
      if (!object) return;

      const keys = embodimentKeys(object.id);
      const episodes = episodesFor(object.id, currentEmbodiment);

      el.objectTitle.textContent = object.name;
      el.objectSubtitle.textContent = `${keys.length} embodiments, ${object.totalEpisodes} sequences`;
      renderObjectMenu();

      el.embodimentTabs.innerHTML = keys.map(embodiment => `
        <button class="tab ${embodiment === currentEmbodiment ? "active" : ""}" type="button" data-embodiment="${embodiment}">
          ${labels[embodiment] || titleize(embodiment)} (${object.embodiments[embodiment]})
        </button>
      `).join("");

      el.embodimentTabs.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", () => openDetail(object.id, tab.dataset.embodiment));
      });

      el.episodeCount.textContent = `${episodes.length} sequences`;
      el.episodeGrid.innerHTML = episodes.map((episode, index) => `
        <button class="episode-card ${episode === currentEpisode ? "active" : ""}" type="button" data-episode="${episode}">
          <div class="episode-thumb">${episodePreviewHtml(currentEmbodiment, object.id, episode)}</div>
          <div class="episode-footer">
            <span class="badge badge-rank">${episodeDisplayLabel(currentEmbodiment, object.id, episode, index)}</span>
            ${episodeResultBadgeHtml(currentEmbodiment, object.id, episode)}
          </div>
        </button>
      `).join("");

      el.episodeGrid.querySelectorAll(".episode-card").forEach(card => {
        card.addEventListener("pointerenter", () => {
          warmPreviewVideo(currentEmbodiment, object.id, card.dataset.episode);
        });
        card.addEventListener("click", () => {
          currentEpisode = card.dataset.episode;
          setActiveEpisodeCard(currentEpisode);
          writeHash();
          loadCurrentEpisode();
        });
      });
    }

    function setActiveEpisodeCard(episode) {
      el.episodeGrid.querySelectorAll(".episode-card").forEach(card => {
        card.classList.toggle("active", card.dataset.episode === episode);
      });
    }

    function loadCurrentEpisode() {
      if (!currentEpisode) return;
      showPreviewOnly(currentEmbodiment, currentObject, currentEpisode);
    }

    function writeHash() {
      history.replaceState(
        null,
        "",
        `#object=${encodeURIComponent(currentObject || "")}&embodiment=${encodeURIComponent(currentEmbodiment || "")}&episode=${encodeURIComponent(currentEpisode || "")}`
      );
    }

    function loadHashState() {
      const state = hashEpisodeState();
      if (state?.objectId && objectData(state.objectId)) {
        openDetail(state.objectId, state.embodiment, state.episode);
      }
    }

    function hashEpisodeState() {
      const params = new URLSearchParams(location.hash.replace(/^#/, ""));
      const objectId = params.get("object");
      const embodiment = params.get("embodiment");
      const episode = params.get("episode");
      if (!objectId || !embodiment || !episode) return null;
      return { objectId, embodiment, episode };
    }

    function glbUrl(embodiment, objectId, episode) {
      const path = [embodiment, objectId, `${episode}.glb`]
        .map(part => encodeURIComponent(part))
        .join("/");
      return `${GLB_BASE}/${path}`;
    }

    function glbAssetFor(embodiment, objectId, episode) {
      return {
        url: glbUrl(embodiment, objectId, episode),
        originalUrl: glbUrl(embodiment, objectId, episode)
      };
    }

    function previewVideoUrl(embodiment, objectId, episode) {
      const path = [embodiment, objectId, episode, "vid", `${PREVIEW_CAMERA_ID}.mp4`]
        .map(part => encodeURIComponent(part))
        .join("/");
      return `${PREVIEW_VIDEO_BASE}/${path}`;
    }

    function previewFor(embodiment, objectId, episode) {
      return {
        video: previewVideoUrl(embodiment, objectId, episode)
      };
    }

    function previewThumbnailSrc(preview) {
      return `${preview.video}#t=0.001`;
    }

    function animationTrimFor(embodiment, objectId, episode) {
      return animationTrims[`${embodiment}/${objectId}/${episode}`] || null;
    }

    function graspResultFor(embodiment, objectId, episode) {
      return graspResults[`${embodiment}/${objectId}/${episode}`] || null;
    }

    function sequenceKeyFor(embodiment, objectId, episode) {
      return `${embodiment}/${objectId}/${episode}`;
    }

    function showInteractive3DFor(embodiment, objectId, episode) {
      return interactive3DVisibility[sequenceKeyFor(embodiment, objectId, episode)] !== false;
    }

    function episodeDisplayLabel(embodiment, objectId, episode, index = 0) {
      const result = graspResultFor(embodiment, objectId, episode);
      const displayEpisode = robotEmbodiments.has(embodiment) && result?.humanPairedEpisode != null
        ? result.humanPairedEpisode
        : episode;
      return `#${String(displayEpisode).padStart(2, "0")}`;
    }

    function episodeTitleLabel(embodiment, objectId, episode) {
      const result = graspResultFor(embodiment, objectId, episode);
      return robotEmbodiments.has(embodiment) && result?.humanPairedEpisode != null
        ? result.humanPairedEpisode
        : episode;
    }

    function episodeResultBadgeHtml(embodiment, objectId, episode) {
      const placeholder = `<span class="badge badge-result badge-success badge-placeholder" aria-hidden="true">success</span>`;
      if (!robotEmbodiments.has(embodiment)) return placeholder;
      const result = graspResultFor(embodiment, objectId, episode);
      if (!result || typeof result.graspSuccess !== "boolean") return placeholder;
      const state = result.graspSuccess ? "success" : "fail";
      return `<span class="badge badge-result badge-${state}">${state}</span>`;
    }

    function episodePreviewHtml(embodiment, objectId, episode) {
      const preview = previewFor(embodiment, objectId, episode);
      const thumbnailSrc = previewThumbnailSrc(preview);
      return `
        <video src="${thumbnailSrc}" preload="metadata" muted playsinline onerror="this.parentElement.classList.add('thumb-missing'); this.remove()"></video>
        <span class="episode-num">#${episode}</span>
      `;
    }

    function objectMenuThumbHtml(object) {
      return objectThumbHtml(object);
    }

    function objectThumbUrl(objectId, base = THUMB_BASE) {
      return `${base}/${encodeURIComponent(objectId)}/thumb.png?v=${THUMB_VERSION}`;
    }

    function objectThumbHtml(object) {
      const thumbSrc = objectThumbUrl(object.id);
      const fallbackSrc = objectThumbUrl(object.id, THUMB_FALLBACK_BASE);
      return `<img src="${thumbSrc}" data-fallback-src="${fallbackSrc}" alt="${object.name}" loading="lazy" onerror="handleObjectThumbError(this)">`;
    }

    function handleObjectThumbError(img) {
      const fallbackSrc = img.dataset.fallbackSrc;
      if (fallbackSrc) {
        img.dataset.fallbackSrc = "";
        img.src = fallbackSrc;
        return;
      }
      img.parentElement.classList.add("thumb-missing");
    }

    function ensurePreviewLayer() {
      if (!previewLayer) {
        previewLayer = document.createElement("div");
        previewLayer.className = "viewer-preview";
        el.viewer.appendChild(previewLayer);
      }
      return previewLayer;
    }

    function trimPreviewVideoCache(activeSrc) {
      if (previewVideoShells.size <= PREVIEW_VIDEO_CACHE_LIMIT) return;
      for (const [src, shell] of previewVideoShells) {
        if (src === activeSrc) continue;
        previewPlayerFor(shell)?.pause();
        shell.remove();
        previewVideoShells.delete(src);
        if (previewVideoShells.size <= PREVIEW_VIDEO_CACHE_LIMIT) return;
      }
    }

    function clearPreviewVideoCache() {
      previewWarmToken += 1;
      if (previewWarmTimer) {
        clearTimeout(previewWarmTimer);
        previewWarmTimer = null;
      }
      for (const shell of previewVideoShells.values()) {
        previewPlayerFor(shell)?.pause();
        shell.remove();
      }
      previewVideoShells.clear();
      activePreviewShell = null;
    }

    function previewPlayerFor(shell) {
      return shell?.querySelector(".viewer-video-player") || null;
    }

    function setPreviewShellReady(shell) {
      shell.classList.add("ready");
      if (shell === activePreviewShell) {
        schedulePreviewWarmup(currentEmbodiment, currentObject, currentEpisode);
      }
    }

    function previewShellFor(preview) {
      const layer = ensurePreviewLayer();
      const src = new URL(preview.video, window.location.href).href;
      const cachedShell = previewVideoShells.get(src);

      if (cachedShell) {
        previewPlayerFor(cachedShell)?.removeAttribute("poster");
        cachedShell.classList.toggle("ready", (previewPlayerFor(cachedShell)?.readyState || 0) >= 2);
        previewVideoShells.delete(src);
        previewVideoShells.set(src, cachedShell);
        return cachedShell;
      }

      const shell = document.createElement("div");
      shell.className = "viewer-video-shell";
      shell.dataset.previewSrc = src;

      const video = document.createElement("video");
      video.className = "viewer-video-player";
      video.controls = true;
      video.preload = "auto";
      video.loop = true;
      video.muted = true;
      video.playsInline = true;
      video.setAttribute("muted", "");
      video.setAttribute("playsinline", "");
      video.setAttribute("webkit-playsinline", "");
      video.fetchPriority = "high";
      video.setAttribute("fetchpriority", "high");
      video.src = preview.video;
      video.addEventListener("loadeddata", () => setPreviewShellReady(shell));
      video.addEventListener("playing", () => setPreviewShellReady(shell));

      const thumb = document.createElement("video");
      thumb.className = "viewer-video-thumb";
      thumb.src = previewThumbnailSrc(preview);
      thumb.preload = "metadata";
      thumb.muted = true;
      thumb.playsInline = true;
      thumb.setAttribute("muted", "");
      thumb.setAttribute("playsinline", "");
      thumb.setAttribute("webkit-playsinline", "");
      thumb.disablePictureInPicture = true;

      shell.appendChild(video);
      shell.appendChild(thumb);
      layer.appendChild(shell);
      previewVideoShells.set(src, shell);
      trimPreviewVideoCache(src);
      return shell;
    }

    function warmPreviewVideo(embodiment, objectId, episode) {
      if (!embodiment || !objectId || episode == null) return;
      const preview = previewFor(embodiment, objectId, episode);
      const shell = previewShellFor(preview);
      if (shell === activePreviewShell) return;
      const video = previewPlayerFor(shell);
      const thumb = shell.querySelector(".viewer-video-thumb");
      if ((video?.readyState || 0) < 2) video?.load?.();
      if ((thumb?.readyState || 0) < 1) thumb?.load?.();
    }

    function warmEpisodeOrder(episodes, activeEpisode) {
      const activeIndex = Math.max(0, episodes.indexOf(activeEpisode));
      const ordered = [];
      for (let offset = 0; ordered.length < Math.min(PREVIEW_WARM_COUNT, episodes.length); offset += 1) {
        const forward = activeIndex + offset;
        const backward = activeIndex - offset;
        if (forward < episodes.length) ordered.push(episodes[forward]);
        if (offset && backward >= 0 && ordered.length < PREVIEW_WARM_COUNT) ordered.push(episodes[backward]);
        if (forward >= episodes.length && backward < 0) break;
      }
      return ordered;
    }

    function schedulePreviewWarmup(embodiment, objectId, activeEpisode) {
      previewWarmToken += 1;
      const token = previewWarmToken;
      if (previewWarmTimer) clearTimeout(previewWarmTimer);

      const episodes = warmEpisodeOrder(episodesFor(objectId, embodiment), activeEpisode);
      let index = 0;
      const warmNext = () => {
        if (token !== previewWarmToken || currentObject !== objectId || currentEmbodiment !== embodiment) return;
        const episode = episodes[index];
        if (episode != null) warmPreviewVideo(embodiment, objectId, episode);
        index += 1;
        if (index < episodes.length) previewWarmTimer = setTimeout(warmNext, 160);
      };
      previewWarmTimer = setTimeout(warmNext, 120);
    }

    function showInstantPreview(embodiment, objectId, episode, options = {}) {
      const restart = options.restart !== false;
      const showActions = options.showActions !== false;
      const layer = ensurePreviewLayer();
      const preview = previewFor(embodiment, objectId, episode);
      const shell = previewShellFor(preview);
      const video = previewPlayerFor(shell);

      if (activePreviewShell && activePreviewShell !== shell) {
        activePreviewShell.classList.remove("active");
        previewPlayerFor(activePreviewShell)?.pause();
      }

      activePreviewShell = shell;
      shell.classList.add("active");
      layer.classList.add("active");
      el.viewer.classList.add("preview-active");
      el.viewerPanel.classList.add("preview-mode");
      if (restart && Number.isFinite(video?.duration)) {
        try {
          video.currentTime = 0;
        } catch (error) {
          console.warn(error);
        }
      }
      if ((video?.readyState || 0) < 2) video?.load?.();
      const playPromise = video?.play?.();
      if (playPromise) playPromise.catch(() => {});
      if ((video?.readyState || 0) >= 2) {
        schedulePreviewWarmup(embodiment, objectId, episode);
      }
      el.viewerStatus.hidden = !showActions;
      el.viewerStatus.textContent = showActions ? "Preview playing" : "";
    }

    function pausePreviewVideo() {
      previewPlayerFor(activePreviewShell)?.pause();
    }

    function hideInstantPreview() {
      if (!previewLayer) return;
      pausePreviewVideo();
      previewLayer.classList.remove("active");
      el.viewer.classList.remove("preview-active");
      el.viewerPanel.classList.remove("preview-mode");
    }

    function currentPreviewAnimationOffset() {
      const video = previewPlayerFor(activePreviewShell);
      const time = Number.isFinite(video?.currentTime) ? video.currentTime : 0;
      const duration = Number.isFinite(video?.duration) && video.duration > 0 ? video.duration : null;
      return duration && animationDuration ? (time / duration) * animationDuration : time;
    }

    function nextFrame() {
      return new Promise(resolve => requestAnimationFrame(resolve));
    }

    function setLoadGlbButtonState(state) {
      if (state === "hidden") {
        el.viewerStatus.hidden = true;
        el.viewerStatus.textContent = "";
        el.loadGlbButton.hidden = true;
        el.loadGlbButton.disabled = true;
        el.loadGlbButton.dataset.action = "hidden";
        el.resetViewButton.hidden = true;
        return;
      }

      el.viewerStatus.hidden = false;
      el.loadGlbButton.hidden = false;

      if (state === "ready") {
        el.loadGlbButton.disabled = false;
        el.loadGlbButton.textContent = "Open interactive 3D";
        el.loadGlbButton.dataset.action = "open";
        el.resetViewButton.hidden = true;
      } else if (state === "loading") {
        el.loadGlbButton.disabled = true;
        el.loadGlbButton.textContent = "Loading";
        el.loadGlbButton.dataset.action = "loading";
        el.resetViewButton.hidden = true;
      } else if (state === "loaded") {
        el.loadGlbButton.disabled = false;
        el.loadGlbButton.textContent = "Play preview";
        el.loadGlbButton.dataset.action = "preview";
        el.resetViewButton.hidden = false;
      } else {
        el.loadGlbButton.disabled = true;
        el.loadGlbButton.textContent = "Open interactive 3D";
        el.loadGlbButton.dataset.action = "idle";
        el.resetViewButton.hidden = true;
      }
    }

    function showPreviewOnly(embodiment, objectId, episode) {
      loadToken += 1;
      const object = objectData(objectId);
      el.viewerTitle.textContent = `${labels[embodiment] || titleize(embodiment)} / ${object?.name || objectId} / sequence ${episodeTitleLabel(embodiment, objectId, episode)}`;
      resetViewerZoomAuto();
      if (viewerReady) clearModel();
      const showActions = showInteractive3DFor(embodiment, objectId, episode);
      showInstantPreview(embodiment, objectId, episode, { showActions });
      setLoadGlbButtonState(showActions ? "ready" : "hidden");
    }

    async function ensureThreeRuntime() {
      if (!threeRuntimePromise) {
        threeRuntimePromise = Promise.all([
          import("three"),
          import("three/addons/controls/OrbitControls.js"),
          import("three/addons/loaders/GLTFLoader.js"),
          import("three/addons/libs/meshopt_decoder.module.js")
        ]).then(([threeModule, controlsModule, loaderModule, meshoptModule]) => {
          THREE = threeModule;
          OrbitControls = controlsModule.OrbitControls;
          GLTFLoader = loaderModule.GLTFLoader;
          MeshoptDecoder = meshoptModule.MeshoptDecoder;
        });
      }
      return threeRuntimePromise;
    }

    async function initViewer() {
      if (viewerReady) return;
      await ensureThreeRuntime();
      if (viewerReady) return;

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xf4efe8);
      clock = new THREE.Clock();

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.domElement.tabIndex = 0;
      renderer.domElement.addEventListener("pointerdown", () => {
        renderer.domElement.focus();
        renderer.domElement.style.cursor = "grabbing";
      });
      window.addEventListener("pointerup", () => {
        renderer.domElement.style.cursor = "grab";
      });
      renderer.domElement.addEventListener("contextmenu", event => event.preventDefault());
      el.viewer.appendChild(renderer.domElement);

      camera = new THREE.PerspectiveCamera(45, 1, 0.001, 1000);
      camera.position.set(1.4, 0.9, 1.4);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.enablePan = true;
      controls.enableRotate = true;
      controls.enableZoom = true;
      controls.screenSpacePanning = true;
      controls.target.set(0, 0, 0);
      controls.mouseButtons = {
        LEFT: THREE.MOUSE.ROTATE,
        MIDDLE: THREE.MOUSE.DOLLY,
        RIGHT: THREE.MOUSE.PAN
      };
      controls.touches = {
        ONE: THREE.TOUCH.ROTATE,
        TWO: THREE.TOUCH.DOLLY_PAN
      };

      scene.add(new THREE.HemisphereLight(0xffffff, 0x7b8492, 2.4));
      const keyLight = new THREE.DirectionalLight(0xffffff, 2.2);
      keyLight.position.set(3, 5, 4);
      scene.add(keyLight);

      new ResizeObserver(resizeViewer).observe(el.viewer);
      window.addEventListener("resize", resizeViewer);
      resizeViewer();
      viewerReady = true;
      animate();
    }

    function resizeViewer() {
      if (!renderer || !camera) return;
      const rect = el.viewer.getBoundingClientRect();
      const width = Math.max(1, Math.floor(rect.width));
      const height = Math.max(1, Math.floor(rect.height));
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height, false);
    }

    function clearModel() {
      if (!model) return;
      scene.remove(model);
      model.traverse(node => {
        if (node.geometry) node.geometry.dispose();
        if (node.material) {
          const materials = Array.isArray(node.material) ? node.material : [node.material];
          materials.forEach(material => material.dispose?.());
        }
      });
      model = null;
      mixer = null;
      animationDuration = 0;
      animationClipDuration = 0;
      animationTrim = null;
      animationTrackData = [];
    }

    async function openGlbCache() {
      if (!("caches" in window)) return null;
      try {
        return await caches.open(GLB_CACHE_NAME);
      } catch (error) {
        console.warn(error);
        return null;
      }
    }

    async function cachedGlbBlob(url) {
      const cache = await openGlbCache();
      if (!cache) return null;
      const cached = await cache.match(url);
      return cached ? cached.blob() : null;
    }

    async function storeGlbBlob(url, blob, headers = new Headers()) {
      const cache = await openGlbCache();
      if (!cache) return;
      const responseHeaders = new Headers(headers);
      if (!responseHeaders.has("content-type")) {
        responseHeaders.set("content-type", blob.type || "model/gltf-binary");
      }
      await cache.put(
        url,
        new Response(blob.slice(0, blob.size, blob.type), {
          status: 200,
          statusText: "OK",
          headers: responseHeaders
        })
      );
    }

    async function downloadGlbBlob(url, priority = "high") {
      const response = await fetch(url, { mode: "cors", priority });
      if (!response.ok) throw new Error(`GLB request failed: ${response.status}`);
      const headers = response.headers;
      const blob = await response.blob();
      storeGlbBlob(url, blob, headers).catch(error => console.warn(error));
      return blob;
    }

    async function glbBlob(url, priority = "high") {
      const cached = await cachedGlbBlob(url);
      if (cached) return { blob: cached, source: "cache" };

      if (!inflightGlbBlobs.has(url)) {
        inflightGlbBlobs.set(
          url,
          downloadGlbBlob(url, priority).finally(() => {
            inflightGlbBlobs.delete(url);
          })
        );
      }

      return {
        blob: await inflightGlbBlobs.get(url),
        source: "network"
      };
    }

    function cameraPresetFor(embodiment) {
      return CAMERA_PRESETS[embodiment] || CAMERA_PRESETS.default;
    }

    function isObjectMeshNode(node) {
      if (!node?.isMesh) return false;
      let current = node;
      while (current) {
        const nodeName = (current.name || "").toLowerCase();
        if (nodeName.startsWith("object_") || nodeName.includes("object")) return true;
        current = current.parent;
      }
      return false;
    }

    function objectMeshMeanCenter(object) {
      const center = new THREE.Vector3();
      const vertex = new THREE.Vector3();
      let count = 0;

      object.updateMatrixWorld(true);
      object.traverse(node => {
        if (!isObjectMeshNode(node) || !node.geometry) return;
        const position = node.geometry.getAttribute("position");
        if (!position) return;

        for (let i = 0; i < position.count; i += 1) {
          vertex.fromBufferAttribute(position, i);
          if (node.isSkinnedMesh && typeof node.boneTransform === "function") {
            node.boneTransform(i, vertex);
          }
          vertex.applyMatrix4(node.matrixWorld);
          center.add(vertex);
          count += 1;
        }
      });

      return count ? center.multiplyScalar(1 / count) : null;
    }

    function clampNumber(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function zoomScaleForObjectCenterY(centerY) {
      if (!Number.isFinite(centerY)) return DEFAULT_VIEW_ZOOM_SCALE;
      const referenceSpan = VIEW_ZOOM_GREEN_CACTUS_VASE_CENTER_Y - VIEW_ZOOM_APPLE_CENTER_Y;
      const zoomSpan = VIEW_ZOOM_GREEN_CACTUS_VASE_SCALE - VIEW_ZOOM_MIN_SCALE;
      const scale = VIEW_ZOOM_MIN_SCALE + ((centerY - VIEW_ZOOM_APPLE_CENTER_Y) / referenceSpan) * zoomSpan;
      return clampNumber(scale, VIEW_ZOOM_MIN_SCALE, VIEW_ZOOM_MAX_SCALE);
    }

    function setAutoZoomFromObjectCenter(objectCenter) {
      viewerObjectCenterY = Number.isFinite(objectCenter?.y) ? objectCenter.y : null;
      viewerAutoZoomScale = zoomScaleForObjectCenterY(viewerObjectCenterY);
      viewerZoomScale = viewerAutoZoomScale;
    }

    function resetViewerZoomAuto() {
      viewerObjectCenterY = null;
      viewerAutoZoomScale = DEFAULT_VIEW_ZOOM_SCALE;
      viewerZoomScale = DEFAULT_VIEW_ZOOM_SCALE;
    }

    function frameObject(object, embodiment, options = {}) {
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const objectCenter = objectMeshMeanCenter(object);
      if (options.updateAutoZoom) {
        setAutoZoomFromObjectCenter(objectCenter);
      }
      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      const preset = cameraPresetFor(embodiment);
      camera.fov = CAMERA_FOV;
      const distance = maxDim / (2 * Math.tan(THREE.MathUtils.degToRad(camera.fov) / 2));
      const viewDirection = new THREE.Vector3(...preset.viewDirection).normalize();
      const presetFocus = new THREE.Vector3(
        maxDim * preset.focus[0],
        maxDim * preset.focus[1],
        maxDim * preset.focus[2]
      );
      const focus = objectCenter ? objectCenter.clone().sub(center) : presetFocus;

      object.position.sub(center);
      camera.up.set(0, 1, 0);
      controls.target.copy(focus);
      camera.near = Math.max(maxDim / 1000, 0.001);
      camera.far = Math.max(maxDim * 100, 100);
      camera.position.copy(focus).addScaledVector(viewDirection, distance * CAMERA_DISTANCE_SCALE * viewerZoomScale);
      camera.updateProjectionMatrix();
      controls.update();
      resizeViewer();
    }

    function resetViewerView() {
      if (!model || !controls || !camera) return;
      frameObject(model, currentEmbodiment);
      renderer?.render(scene, camera);
    }

    function normalizeAnimationTrim(trim, clipDuration) {
      if (!trim || !clipDuration) return null;
      const start = Math.max(0, Math.min(trim.start || 0, clipDuration));
      const end = Math.max(start, Math.min(trim.end || clipDuration, clipDuration));
      return end - start > 0.001 ? { start, end } : null;
    }

    function wrapTime(value, duration) {
      if (!duration) return value;
      return ((value % duration) + duration) % duration;
    }

    function sourceAnimationTime(trimmedTime) {
      const start = animationTrim?.start || 0;
      return start + wrapTime(trimmedTime, animationDuration);
    }

    function trackTargetNodeName(trackName) {
      const dotIndex = trackName.lastIndexOf(".");
      return (dotIndex === -1 ? trackName : trackName.slice(0, dotIndex)).replace(/^\//, "");
    }

    function boundsForNode(node) {
      if (!node) return null;
      const box = new THREE.Box3().setFromObject(node);
      if (box.isEmpty()) return null;
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      return {
        min: box.min.toArray(),
        max: box.max.toArray(),
        center: center.toArray(),
        size: size.toArray()
      };
    }

    function motionRoleForNode(nodeName) {
      const lowerName = (nodeName || "").toLowerCase();
      if (!lowerName || lowerName.includes("floor")) return "ignore";
      if (lowerName.startsWith("object_") || lowerName.includes("object")) return "object";
      if (lowerName.includes("human") || lowerName.includes("mano") || lowerName.includes("hand")) return "hand";
      if (lowerName.includes("robot")) return "robot";
      return "unknown";
    }

    function enforceAnimationTrim() {
      if (!mixer || !animationTrim || !animationDuration) return;
      if (mixer.time < animationTrim.start || mixer.time >= animationTrim.end) {
        mixer.setTime(animationTrim.start + wrapTime(mixer.time - animationTrim.start, animationDuration));
      }
    }

    function setAnimationSourceFrame(loadedModel, time) {
      if (!mixer || !animationClipDuration) return;
      mixer.setTime(Math.max(0, Math.min(time, animationClipDuration)));
      loadedModel.updateMatrixWorld(true);
    }

    function playAnimations(gltf, loadedModel, trim = null) {
      const clips = gltf.animations || [];
      animationTrackData = clips.flatMap(clip => clip.tracks.map(track => ({
        name: track.name,
        nodeName: trackTargetNodeName(track.name),
        role: motionRoleForNode(trackTargetNodeName(track.name)),
        bounds: boundsForNode(loadedModel.getObjectByName(trackTargetNodeName(track.name))),
        valueSize: track.getValueSize(),
        times: Array.from(track.times),
        values: Array.from(track.values)
      })));
      if (!clips.length) {
        animationDuration = 0;
        animationClipDuration = 0;
        animationTrim = null;
        return;
      }

      mixer = new THREE.AnimationMixer(loadedModel);
      animationClipDuration = Math.max(...clips.map(clip => clip.duration || 0));
      animationTrim = normalizeAnimationTrim(trim, animationClipDuration);
      animationDuration = animationTrim ? animationTrim.end - animationTrim.start : animationClipDuration;
      for (const clip of clips) {
        const action = mixer.clipAction(clip);
        action.reset();
        action.setLoop(THREE.LoopRepeat, Infinity);
        action.play();
      }
      setAnimationSourceFrame(loadedModel, sourceAnimationTime(0));
    }

    function syncAnimationToPreview() {
      if (!mixer || !animationDuration) return;
      mixer.setTime(sourceAnimationTime(currentPreviewAnimationOffset()));
      clock?.getDelta();
      controls?.update();
      renderer?.render(scene, camera);
    }

    function setAnimationTime(time) {
      if (!mixer || !renderer || !scene || !camera) return false;
      mixer.timeScale = 1;
      mixer.setTime(animationDuration ? sourceAnimationTime(time) : time);
      mixer.timeScale = 0;
      controls?.update();
      renderer.render(scene, camera);
      return true;
    }

    function setSourceAnimationTime(time) {
      if (!mixer || !renderer || !scene || !camera) return false;
      mixer.timeScale = 1;
      mixer.setTime(Math.max(0, Math.min(time, animationClipDuration || time)));
      mixer.timeScale = 0;
      controls?.update();
      renderer.render(scene, camera);
      return true;
    }

    function createGltfLoader() {
      const loader = new GLTFLoader();
      if (MeshoptDecoder) loader.setMeshoptDecoder(MeshoptDecoder);
      return loader;
    }

    function parseGltf(arrayBuffer, url) {
      return new Promise((resolve, reject) => {
        const resourcePath = url.slice(0, url.lastIndexOf("/") + 1);
        createGltfLoader().parse(arrayBuffer, resourcePath, resolve, reject);
      });
    }

    function materialList(node) {
      if (!node.material) return [];
      return Array.isArray(node.material) ? node.material : [node.material];
    }

    function isDefaultObjectMaterial(material) {
      if (!material?.color) return false;
      const materialName = (material.name || "").toLowerCase();
      const looksDefault = materialName.includes("default") || materialName.includes("object");
      return looksDefault
        && !material.vertexColors
        && material.color.r > 0.94
        && material.color.g > 0.94
        && material.color.b > 0.94;
    }

    function applyViewerMaterialTone(loadedModel) {
      const robotSpaceGray = new THREE.Color(ROBOT_SPACE_GRAY_COLOR);
      const objectDefaultBeige = new THREE.Color(OBJECT_DEFAULT_BEIGE_COLOR);
      loadedModel.traverse(node => {
        if (!node.isMesh) return;
        const nodeName = (node.name || "").toLowerCase();
        const isRobotMesh = nodeName.includes("robot");
        const isObjectMesh = isObjectMeshNode(node);

        materialList(node).forEach(material => {
          if (isRobotMesh && material?.color) {
            material.color.copy(robotSpaceGray);
            if ("metalness" in material) material.metalness = Math.max(material.metalness || 0, 0.08);
            if ("roughness" in material) material.roughness = Math.min(material.roughness ?? 0.78, 0.72);
            material.needsUpdate = true;
            return;
          }

          if (isObjectMesh && isDefaultObjectMaterial(material)) {
            material.color.copy(objectDefaultBeige);
            if ("roughness" in material) material.roughness = Math.min(material.roughness ?? 0.78, 0.74);
            material.needsUpdate = true;
          }
        });
      });
    }

    async function loadViewer(embodiment, objectId, episode) {
      if (!showInteractive3DFor(embodiment, objectId, episode)) {
        showPreviewOnly(embodiment, objectId, episode);
        return;
      }

      const token = ++loadToken;
      const object = objectData(objectId);
      el.viewerTitle.textContent = `${labels[embodiment] || titleize(embodiment)} / ${object?.name || objectId} / sequence ${episodeTitleLabel(embodiment, objectId, episode)}`;
      resetViewerZoomAuto();
      showInstantPreview(embodiment, objectId, episode, { restart: false });
      setLoadGlbButtonState("loading");

      const asset = glbAssetFor(embodiment, objectId, episode);
      const glbPromise = glbBlob(asset.url, "low");

      try {
        await initViewer();
      } catch (error) {
        glbPromise.catch(() => {});
        if (token === loadToken) {
          el.viewerStatus.textContent = "Viewer failed to load";
          setLoadGlbButtonState("ready");
        }
        console.error(error);
        return;
      }

      if (token !== loadToken) {
        glbPromise.catch(() => {});
        return;
      }
      clearModel();
      el.viewerStatus.textContent = "Fetching GLB";

      try {
        const { blob, source } = await glbPromise;
        if (token !== loadToken) return;
        el.viewerStatus.textContent = source === "cache" ? "Parsing cached GLB" : "Parsing GLB";
        await nextFrame();
        const arrayBuffer = await blob.arrayBuffer();
        if (token !== loadToken) return;
        el.viewerStatus.textContent = "Parsing GLB";
        await nextFrame();
        const gltf = await parseGltf(arrayBuffer, asset.originalUrl);
        if (token !== loadToken) return;
        const loadedModel = gltf.scene;
        applyViewerMaterialTone(loadedModel);
        loadedModel.rotation.set(-Math.PI / 2, 0, 0);
        loadedModel.updateMatrixWorld(true);
        scene.add(loadedModel);
        model = loadedModel;
        playAnimations(gltf, loadedModel, animationTrimFor(embodiment, objectId, episode));
        setAnimationSourceFrame(loadedModel, 0);
        frameObject(loadedModel, embodiment, { updateAutoZoom: true });
        setAnimationSourceFrame(loadedModel, sourceAnimationTime(0));
        syncAnimationToPreview();
        renderer.render(scene, camera);
        requestAnimationFrame(() => {
          if (token === loadToken) hideInstantPreview();
        });
        el.viewerStatus.textContent = "Interactive 3D";
        setLoadGlbButtonState("loaded");
      } catch (error) {
        if (token === loadToken) {
          el.viewerStatus.textContent = "Load failed";
          setLoadGlbButtonState("ready");
        }
        console.error(error);
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      if (mixer) {
        mixer.update(delta);
        enforceAnimationTrim();
      }
      controls.update();
      renderer.render(scene, camera);
    }

    window.__hrdexdbPreviewCapture = {
      setTime: setAnimationTime,
      setSourceTime: setSourceAnimationTime,
      tracks() {
        return animationTrackData;
      },
      state() {
        return {
          loaded: !!model,
          duration: animationDuration,
          clipDuration: animationClipDuration,
          time: mixer?.time || 0,
          trim: animationTrim,
          viewerReady,
          viewerObjectCenterY,
          viewerAutoZoomScale,
          viewerZoomScale
        };
      },
      viewerBox() {
        const rect = el.viewer.getBoundingClientRect();
        return {
          x: Math.round(rect.x),
          y: Math.round(rect.y),
          width: Math.round(rect.width),
          height: Math.round(rect.height)
        };
      }
    };

    el.search.addEventListener("input", () => {
      applyGalleryFilters();
      renderGallery();
    });
    el.sort.addEventListener("change", () => {
      applyGalleryFilters();
      renderGallery();
    });
    document.addEventListener("keydown", event => {
      if (event.key === "/" && document.activeElement !== el.search && !["INPUT", "SELECT", "TEXTAREA"].includes(document.activeElement?.tagName)) {
        event.preventDefault();
        el.search.focus();
      } else if (event.key === "Escape" && document.activeElement === el.search) {
        el.search.value = "";
        applyGalleryFilters();
        renderGallery();
        el.search.blur();
      }
    });
    el.objectMenuSearch.addEventListener("input", event => {
      detailObjectQuery = event.target.value;
      renderObjectMenu();
    });

    el.galleryNav.addEventListener("click", openGallery);
    el.loadGlbButton.addEventListener("click", () => {
      if (!currentObject || !currentEmbodiment || !currentEpisode) return;
      if (el.loadGlbButton.dataset.action === "preview") {
        showPreviewOnly(currentEmbodiment, currentObject, currentEpisode);
      } else {
        loadViewer(currentEmbodiment, currentObject, currentEpisode);
      }
    });
    el.resetViewButton.addEventListener("click", resetViewerView);

    function markViewerGlobalError(error) {
      if (el.loadGlbButton.dataset.action !== "loading") return;
      el.viewerStatus.textContent = "Viewer error";
      if (error) console.warn(error);
    }

    window.addEventListener("error", event => {
      markViewerGlobalError(event.error || event.message);
    });
    window.addEventListener("unhandledrejection", event => {
      markViewerGlobalError(event.reason);
    });
  </script>
</body>
</html>
